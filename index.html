<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALCON OPS Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0b1220; --line:#21304d; --txt:#e8eefc; --muted:#98a8c7;
      --pri:#2f7cff; --pri2:#1f5fd1; --bot:#16233b; --usr:#2f7cff;
      --warn:#f59e0b; --ok:#10b981; --err:#ef4444;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0b1220;color:var(--txt)}
    .app{height:100%;display:flex;align-items:center;justify-content:center;padding:16px}
    .panel{width:min(1100px,100%);height:min(92vh,900px);display:grid;grid-template-columns:320px 1fr;background:#0f1728;border:1px solid var(--line);border-radius:16px;overflow:hidden}
    .left{border-right:1px solid var(--line);display:flex;flex-direction:column}
    .brand{padding:18px;border-bottom:1px solid var(--line)}
    .brand h1{margin:0;font-size:18px}
    .brand p{margin:6px 0 0;color:var(--muted);font-size:12px}
    .ctx{padding:14px 18px;border-bottom:1px solid var(--line);display:grid;gap:6px}
    .ctx .kv{font-size:12px;color:var(--muted)}
    .ctx .kv b{color:var(--txt)}
    .quick{padding:14px;display:grid;gap:8px;overflow:auto}
    .qbtn{border:1px solid #2a3b60;background:#13203a;color:#dbe7ff;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:600;cursor:pointer;text-align:left}
    .qbtn:hover{background:#1a2b4a}
    .right{display:flex;flex-direction:column;min-width:0}
    .top{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .badge{font-size:11px;padding:4px 10px;border:1px solid #314a7a;border-radius:999px;background:#1a2744;color:#bcd0ff}
    .top .actions{display:flex;gap:8px;align-items:center}
    .top .logout{background:transparent;border:1px solid #3a4e7a;color:#bcd0ff;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer}
    .top .logout:hover{background:#1a2744}
    .messages{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
    .msg-wrap{display:flex}
    .msg-wrap.user{justify-content:flex-end}
    .msg{max-width:min(82%,700px);padding:10px 12px;border-radius:12px;font-size:14px;line-height:1.45;white-space:pre-wrap;word-break:break-word;border:1px solid transparent}
    .msg.bot{background:var(--bot);border-color:#263b62}
    .msg.user{background:var(--usr);color:#fff}
    .msg.system{background:#2a1f10;border-color:#5f4215;color:#ffd9a1}
    .input{border-top:1px solid var(--line);padding:10px;display:flex;gap:10px}
    .input input{flex:1;background:#111d34;border:1px solid #2a3f69;color:#e5eeff;border-radius:10px;padding:11px 12px;font-size:14px;outline:none}
    .input button{background:var(--pri);border:0;color:#fff;border-radius:10px;padding:0 16px;font-weight:700;cursor:pointer}
    .input button:hover{background:var(--pri2)}
    .login-wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:20px}
    .login{width:min(420px,100%);background:#0f1728;border:1px solid var(--line);border-radius:14px;padding:20px}
    .login h2{margin:0 0 8px}
    .login p{margin:0 0 14px;color:var(--muted);font-size:13px}
    .f{display:grid;gap:8px;margin-bottom:12px}
    .f label{font-size:12px;color:#b8c7e6}
    .f input{background:#101a2f;border:1px solid #2a3b61;color:#eaf1ff;border-radius:10px;padding:10px 11px;font-size:14px;outline:none}
    .login button{width:100%;height:42px;border:0;border-radius:10px;background:var(--pri);color:#fff;font-weight:700;cursor:pointer}
    .login button:disabled{opacity:.6;cursor:wait}
    .err{margin-top:10px;color:#ffb4b4;font-size:12px;min-height:16px}
    .hidden{display:none!important}
    .mini-table{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px}
    .mini-table th,.mini-table td{border-bottom:1px solid #2a3f67;padding:6px 4px;text-align:left}
    .mini-table th{color:#a8bee8;font-weight:600}
    .typing{display:inline-flex;gap:5px;align-items:center}
    .typing i{width:7px;height:7px;border-radius:50%;background:#9db7f3;display:inline-block;animation:blink 1.1s infinite}
    .typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
    @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-2px)}}
    @media(max-width:920px){.panel{grid-template-columns:1fr}.left{display:none}}
  </style>
</head>
<body>
  <div class="app">
    <div id="loginScreen" class="login-wrap">
      <div class="login">
        <h2>ALCON OPS</h2>
        <p>Acceso al asistente operativo</p>
        <div class="f"><label>Correo</label><input id="loginEmail" type="email" autocomplete="username" /></div>
        <div class="f"><label>Contraseña</label><input id="loginPassword" type="password" autocomplete="current-password" /></div>
        <button id="btnLogin">Ingresar</button>
        <div id="loginError" class="err"></div>
      </div>
    </div>

    <div id="chatScreen" class="panel hidden">
      <aside class="left">
        <div class="brand"><h1>ALCON OPS · Chatbot</h1><p>Asistente operativo de empresa</p></div>
        <div class="ctx">
          <div class="kv">Usuario: <b id="ctxUser">-</b></div>
          <div class="kv">Empresa: <b id="ctxEmpresa">-</b></div>
          <div class="kv">Rol: <b id="ctxRol">-</b></div>
        </div>
        <div class="quick" id="quickActions">
          <button class="qbtn" data-q="crear cliente">Crear cliente</button>
          <button class="qbtn" data-q="crear cotización">Crear cotización</button>
          <button class="qbtn" data-q="crear alquiler">Crear alquiler</button>
          <button class="qbtn" data-q="alquileres activos">Alquileres activos</button>
          <button class="qbtn" data-q="cotizaciones aprobadas">Cotizaciones aprobadas</button>
          <button class="qbtn" data-q="máquinas disponibles">Máquinas disponibles</button>
          <button class="qbtn" data-q="resumen del día">Resumen</button>
          <button class="qbtn" data-q="finanzas">Finanzas</button>
        </div>
      </aside>
      <section class="right">
        <div class="top">
          <div>Asistente Operativo</div>
          <div class="actions">
            <span class="badge">Conectado</span>
            <button id="btnLogout" class="logout" title="Cerrar sesión">Salir</button>
          </div>
        </div>
        <div id="messages" class="messages"></div>
        <div class="input"><input id="chatInput" placeholder="Escribe una consulta o comando..." /><button id="btnSend">Enviar</button></div>
      </section>
    </div>
  </div>

  <script>
  (function(){
    "use strict";
    // ============================================================
    // CONFIGURACIÓN SUPABASE
    // ============================================================
    const SUPABASE_URL = "https://oguxdohmutqgacahcwop.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ndXhkb2htdXRxZ2FjYWhjd29wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mjc0NzcsImV4cCI6MjA4ODMwMzQ3N30.RRruTo8B7k4R97Igq7_KV1PV58FqrpIzEu0R_MXIwR8";

    // Renombramos para evitar colisión con el binding global 'supabase' del SDK UMD
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    // ============================================================
    // ESTADO GLOBAL
    // ============================================================
    let empresa_id = null;
    let rol_usuario = null;
    let flujoActual = null;
    let user_id = null;
    let empresa_nombre = "";
    let usuario_email = "";

    // ============================================================
    // UTILIDADES
    // ============================================================
    function fmt(n){ return (Number(n) || 0).toLocaleString("es-CO"); }

    function normalizarTexto(t){
      return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim();
    }

    // Escapar caracteres peligrosos para .or() de PostgREST
    function escPostgrest(s){
      return String(s||"").replace(/[,()"']/g,"").trim();
    }

    function logErr(ctx, err){
      try{ console.error("[ALCON]", ctx, err); }catch(_){}
    }

    // ============================================================
    // INICIO: REHIDRATAR SESIÓN SI EXISTE
    // ============================================================
    async function initApp(){
      try{
        const { data, error } = await sb.auth.getSession();
        if(error){ logErr("getSession", error); return; }
        if(data?.session?.user){
          await cargarContextoUsuario();
        }
      }catch(e){
        logErr("initApp", e);
      }
    }

    // ============================================================
    // MENSAJES UI
    // ============================================================
    function agregarMensaje(tipo,texto,html=false){
      const box = document.getElementById("messages");
      const wrap = document.createElement("div");
      const msg = document.createElement("div");
      wrap.className = "msg-wrap " + (tipo==="user" ? "user" : "");
      msg.className = "msg " + (tipo==="user" ? "user" : (tipo==="system" ? "system" : "bot"));
      if(html) msg.innerHTML = texto; else msg.textContent = texto;
      wrap.appendChild(msg);
      box.appendChild(wrap);
      box.scrollTop = box.scrollHeight;
      return wrap;
    }

    function mostrarTyping(){
      const w = agregarMensaje("bot","");
      const m = w.querySelector(".msg");
      m.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>';
      return {
        stop: (t, h=false) => {
          if(t===undefined || t===null || t===""){ w.remove(); return; }
          if(h) m.innerHTML = t; else m.textContent = t;
          const box = document.getElementById("messages");
          box.scrollTop = box.scrollHeight;
        },
        remove: () => { try{ w.remove(); }catch(_){} }
      };
    }

    // ============================================================
    // PERMISOS POR ROL
    // ============================================================
    function puedeEjecutarAccion(tipo){
      if(!rol_usuario) return false;
      const rol = normalizarTexto(rol_usuario);
      if(rol === "superadmin" || rol === "admin_empresa" || rol === "admin") return true;
      if(rol === "operaciones"){
        return ["crear_alquiler","asignar_maquina","cambiar_estado_maquina",
                "consultar_alquileres","consultar_maquinas","consultar_clientes",
                "consultar_finanzas","consultar_resumen"].includes(tipo);
      }
      if(rol === "comercial"){
        return ["crear_cliente","crear_cotizacion","consultar_cotizaciones",
                "consultar_clientes","consultar_resumen"].includes(tipo);
      }
      return false;
    }

    // ============================================================
    // LOGIN / LOGOUT
    // ============================================================
    async function login(){
      const btn = document.getElementById("btnLogin");
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const err = document.getElementById("loginError");
      err.textContent = "";

      if(!email || !password){ err.textContent = "Ingresa correo y contraseña."; return; }
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ err.textContent = "Correo inválido."; return; }

      btn.disabled = true;
      try{
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if(error){
          logErr("signInWithPassword", error);
          const msg = (error.message||"").toLowerCase();
          if(msg.includes("invalid")) err.textContent = "Credenciales inválidas.";
          else if(msg.includes("email not confirmed")) err.textContent = "Correo no confirmado.";
          else if(msg.includes("network")) err.textContent = "Sin conexión. Intenta de nuevo.";
          else err.textContent = "No se pudo iniciar sesión. Intenta de nuevo.";
          return;
        }
        if(!data?.user){ err.textContent = "Respuesta inválida del servidor."; return; }
        await cargarContextoUsuario();
      }catch(e){
        logErr("login", e);
        err.textContent = "Error de conexión con autenticación.";
      }finally{
        btn.disabled = false;
      }
    }

    async function logout(){
      try{ await sb.auth.signOut(); }catch(e){ logErr("signOut", e); }
      empresa_id = null; rol_usuario = null; flujoActual = null;
      user_id = null; empresa_nombre = ""; usuario_email = "";
      document.getElementById("messages").innerHTML = "";
      document.getElementById("loginPassword").value = "";
      document.getElementById("loginError").textContent = "";
      document.getElementById("chatScreen").classList.add("hidden");
      document.getElementById("loginScreen").classList.remove("hidden");
    }

    // ============================================================
    // CONTEXTO USUARIO
    // ============================================================
    async function cargarContextoUsuario(){
      const errBox = document.getElementById("loginError");
      try{
        const { data: au, error: ae } = await sb.auth.getUser();
        if(ae || !au?.user){
          errBox.textContent = "No se pudo validar sesión.";
          return;
        }
        user_id = au.user.id;
        usuario_email = au.user.email || "";

        const { data: ue, error: eue } = await sb
          .from("usuarios_empresas")
          .select("user_id,empresa_id,rol,empresa:empresas(nombre)")
          .eq("user_id", user_id)
          .maybeSingle();

        if(eue){
          logErr("usuarios_empresas", eue);
          errBox.textContent = "Error consultando datos de empresa.";
          await sb.auth.signOut();
          return;
        }
        if(!ue || !ue.empresa_id){
          errBox.textContent = "Usuario sin empresa asignada. Contacta al administrador.";
          await sb.auth.signOut();
          return;
        }

        empresa_id = ue.empresa_id;
        rol_usuario = ue.rol || "operaciones";
        empresa_nombre = ue.empresa?.nombre || "Empresa";
        mostrarChat();
      }catch(e){
        logErr("cargarContextoUsuario", e);
        errBox.textContent = "No se pudo cargar el contexto.";
      }
    }

    function mostrarChat(){
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("chatScreen").classList.remove("hidden");
      document.getElementById("ctxUser").textContent = usuario_email || user_id || "-";
      document.getElementById("ctxEmpresa").textContent = empresa_nombre || "-";
      document.getElementById("ctxRol").textContent = rol_usuario || "-";
      const box = document.getElementById("messages");
      if(!box.children.length){
        agregarMensaje("bot",`Hola. Sesión iniciada como ${empresa_nombre} (${rol_usuario}).`);
        agregarMensaje("bot","Comandos: crear cliente, crear cotización, crear alquiler, alquileres activos, máquinas disponibles, finanzas, resumen. Escribe 'cancelar' para abortar un flujo.");
      }
      document.getElementById("chatInput").focus();
    }

    // ============================================================
    // DETECCIÓN DE INTENCIÓN (chatbot sin IA)
    // ============================================================
    function detectarIntencion(texto){
      let x = normalizarTexto(texto);
      x = x
        .replace(/\ben marcha\b|\bvigente\b|\btrabajando\b|\bcurso\b|\ben curso\b/g,"activo")
        .replace(/\blibre\b|\blibres\b|\bdesocupada?s?\b/g,"disponible")
        .replace(/\baceptada\b|\baceptadas\b/g,"aprobada")
        .replace(/\brenta\b|\brentas\b/g,"alquiler")
        .replace(/\bequipos?\b/g,"maquina")
        .replace(/\bmaquinas\b/g,"maquina")
        .replace(/\bcrear empresa\b|\bregistrar cliente\b|\bagregar cliente\b/g,"crear cliente")
        .replace(/\bcoti\b|\bcotis\b|\bcotizaciones\b/g,"cotizacion")
        .replace(/\bn\.?\s*i\.?\s*t\b|\bn it\b|\bnit\b/g,"nit");

      // Comandos de creación
      if(/\b(crear|nuevo|nueva|registrar|agregar)\b.*\bcliente\b/.test(x)) return {type:"crear_cliente"};
      if(/\b(crear|nueva|nuevo|hacer)\b.*\bcotizacion\b/.test(x)) return {type:"crear_cotizacion"};
      if(/\b(crear|nuevo|nueva|iniciar)\b.*\balquiler\b/.test(x)) return {type:"crear_alquiler"};
      if(/\basignar\b.*\bmaquina\b/.test(x)) return {type:"asignar_maquina"};
      if(/(cambiar|actualizar|modificar).*estado.*maquina|\bestado\b.*\bmaquina\b/.test(x)) return {type:"cambiar_estado_maquina"};

      // Consultas alquileres
      if(/\balquiler(es)?\b/.test(x)){
        if(/por vencer|vencer|proximo a vencer/.test(x)) return {type:"consultar_alquileres",filtro:"por_vencer"};
        if(/reservado/.test(x)) return {type:"consultar_alquileres",filtro:"reservado"};
        if(/finalizado|terminado|cerrado/.test(x)) return {type:"consultar_alquileres",filtro:"finalizado"};
        if(/pendiente.*recogida|por recoger/.test(x)) return {type:"consultar_alquileres",filtro:"pendiente_recogida"};
        return {type:"consultar_alquileres",filtro:"activo"};
      }

      // Consultas cotizaciones
      if(/\bcotizacion(es)?\b/.test(x)){
        const estados = ["borrador","en_revision","enviada","aprobada","negociacion","rechazada","perdida","vencida","reabierta","cancelada"];
        for(const e of estados){
          if(x.includes(e.replace("_"," ")) || x.includes(e)) return {type:"consultar_cotizaciones",filtro:e};
        }
        return {type:"consultar_cotizaciones",filtro:"aprobada"};
      }

      // Consultas máquinas
      if(/\bmaquina(s)?\b/.test(x)){
        if(/disponible/.test(x)) return {type:"consultar_maquinas",filtro:"disponible"};
        if(/mantenimiento/.test(x)) return {type:"consultar_maquinas",filtro:"mantenimiento"};
        if(/varad/.test(x)) return {type:"consultar_maquinas",filtro:"varado"};
        if(/activo|trabajando/.test(x)) return {type:"consultar_maquinas",filtro:"trabajando"};
        if(/baja\b/.test(x)) return {type:"consultar_maquinas",filtro:"baja"};
        return {type:"consultar_maquinas",filtro:"disponible"};
      }

      if(/\b(finanza|ingreso|gasto|caja|balance|dinero|plata)\b/.test(x)) return {type:"consultar_finanzas"};
      if(/\b(resumen|estado general|que tengo hoy|hoy|dashboard|panel)\b/.test(x)) return {type:"consultar_resumen"};

      if(/\bcliente(s)?\b/.test(x)){
        const m = x.match(/cliente(?:s)?\s+(.+)/);
        return {type:"consultar_clientes", busqueda: m ? m[1].trim() : ""};
      }

      return {type:"desconocida"};
    }

    // ============================================================
    // EXTRACTOR DE DATOS DE CLIENTE
    // ============================================================
    function extraerDatosCliente(texto){
      const t = texto || "";
      const o = {};
      const nit = t.match(/(?:nit)\s*[:#-]?\s*([\d.\-\s]{5,18})/i);
      const tel = t.match(/(?:telefono|teléfono|tel|celular|movil|móvil)\s*[:#-]?\s*(\+?[\d\s-]{7,18})/i);
      const cor = t.match(/[a-zA-Z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/i);
      const nom = t.match(/(?:nombre|empresa|cliente)\s*[:#-]?\s*([a-zA-Z0-9ÁÉÍÓÚÑáéíóúñ .,&-]{3,})/i);
      const con = t.match(/(?:contacto)\s*[:#-]?\s*([a-zA-ZÁÉÍÓÚÑáéíóúñ .-]{3,})/i);
      const car = t.match(/(?:cargo)\s*[:#-]?\s*([a-zA-ZÁÉÍÓÚÑáéíóúñ .-]{3,})/i);
      const dir = t.match(/(?:direccion|dirección)\s*[:#-]?\s*([a-zA-Z0-9ÁÉÍÓÚÑáéíóúñ #.,-]{5,})/i);
      const ciu = t.match(/(?:ciudad)\s*[:#-]?\s*([a-zA-ZÁÉÍÓÚÑáéíóúñ .-]{3,})/i);
      const obs = t.match(/(?:obs|observacion|observación)\s*[:#-]?\s*(.+)$/i);

      if(nit) o.nit = nit[1].replace(/[.\-\s]/g,"");
      if(tel) o.telefono = tel[1].replace(/\s+/g,"").trim();
      if(cor) o.correo = cor[0];
      if(nom) o.nombre_empresa = nom[1].trim();
      if(con) o.contacto = con[1].trim();
      if(car) o.cargo = car[1].trim();
      if(dir) o.direccion = dir[1].trim();
      if(ciu) o.ciudad = ciu[1].trim();
      if(obs) o.obs = obs[1].trim();
      return o;
    }

    // ============================================================
    // FLUJO: CREAR CLIENTE
    // ============================================================
    async function iniciarFlujoCliente(txt=""){
      flujoActual = { tipo:"crear_cliente", data:{ nombre_empresa:"",nit:"",telefono:"",correo:"",contacto:"",cargo:"",direccion:"",ciudad:"",obs:"" } };
      if(txt) Object.assign(flujoActual.data, extraerDatosCliente(txt));
      await continuarFlujoCliente("");
    }

    async function continuarFlujoCliente(input){
      if(!flujoActual || flujoActual.tipo!=="crear_cliente") return;
      if(input){
        const ex = extraerDatosCliente(input);
        Object.assign(flujoActual.data, ex);
        if(flujoActual.esperandoCampo && !ex[flujoActual.esperandoCampo]){
          flujoActual.data[flujoActual.esperandoCampo] = input.trim();
        }
      }

      const d = flujoActual.data;
      const falt = [];
      ["nombre_empresa","nit","telefono","correo","contacto","cargo","direccion","ciudad","obs"].forEach(k=>{ if(!d[k]) falt.push(k); });
      if(falt.length){
        const q = {
          nombre_empresa:"Necesito el nombre de la empresa cliente.",
          nit:"Necesito el NIT del cliente (solo números).",
          telefono:"Necesito el teléfono del cliente.",
          correo:"Necesito el correo del cliente.",
          contacto:"Necesito el nombre del contacto.",
          cargo:"Necesito el cargo del contacto.",
          direccion:"Necesito la dirección.",
          ciudad:"Necesito la ciudad.",
          obs:"Agrega observación (o escribe: sin observaciones)."
        };
        flujoActual.esperandoCampo = falt[0];
        agregarMensaje("bot", q[falt[0]]);
        return;
      }

      // Validación NIT Colombia: 5 a 15 dígitos (admite guion verificador en captura)
      const nitLimpio = String(d.nit).replace(/[.\-\s]/g,"");
      if(!/^\d{5,15}$/.test(nitLimpio)){
        flujoActual.esperandoCampo="nit";
        d.nit = "";
        agregarMensaje("bot","NIT inválido. Debe contener solo números (5 a 15 dígitos). Escríbelo de nuevo.");
        return;
      }
      d.nit = nitLimpio;

      // Validación correo
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d.correo)){
        flujoActual.esperandoCampo="correo";
        d.correo = "";
        agregarMensaje("bot","Correo inválido. Escríbelo de nuevo.");
        return;
      }

      await guardarCliente();
    }

    async function continuarFlujoCotizacion(input){
      const d = flujoActual.data;
      const x = normalizarTexto(input);

      if(flujoActual.esperando==="cliente_busqueda"){
        try{
          const b = escPostgrest(input);
          if(!b){ agregarMensaje("bot","Escribe nombre o NIT del cliente."); return; }
          const { data, error } = await sb
            .from("clientes")
            .select("id,nombre_empresa,nit")
            .eq("empresa_id",empresa_id)
            .or(`nombre_empresa.ilike.%${b}%,nit.ilike.%${b}%`)
            .limit(1);
          if(error){ logErr("buscar cliente cot", error); agregarMensaje("system","Error consultando clientes."); return; }
          if(!data || !data.length){
            agregarMensaje("bot","No encontré cliente. Escribe 'crear cliente' para registrarlo o 'cancelar' para salir.");
            return;
          }
          d.cliente_id = data[0].id;
          flujoActual.esperando = "tipo";
          agregarMensaje("bot",`Cliente: ${data[0].nombre_empresa}. Indica tipo (ej: elevador tijera, articulado).`);
          return;
        }catch(e){
          logErr("continuarFlujoCotizacion cliente", e);
          agregarMensaje("system","Error de red buscando cliente.");
          return;
        }
      }

      if(flujoActual.esperando==="tipo"){ d.tipo=input.trim(); flujoActual.esperando="altura"; agregarMensaje("bot","Indica altura (en metros o pies)."); return; }
      if(flujoActual.esperando==="altura"){ d.altura=input.trim(); flujoActual.esperando="dias"; agregarMensaje("bot","Indica días."); return; }
      if(flujoActual.esperando==="dias"){
        const n = Number(input); if(!n || n<=0){ agregarMensaje("bot","Días inválido. Escribe un número mayor a 0."); return; }
        d.dias=String(n); flujoActual.esperando="precio"; agregarMensaje("bot","Indica precio por día."); return;
      }
      if(flujoActual.esperando==="precio"){
        const n = Number(String(input).replace(/[^\d.]/g,""));
        if(!n || n<=0){ agregarMensaje("bot","Precio inválido. Escribe un número mayor a 0."); return; }
        d.precio=String(n); flujoActual.esperando="modalidad"; agregarMensaje("bot","Indica modalidad: alquiler_dia o transporte_viaje."); return;
      }
      if(flujoActual.esperando==="modalidad"){
        d.modalidad = x.includes("transporte") ? "transporte_viaje" : "alquiler_dia";
        if(d.modalidad==="transporte_viaje"){ flujoActual.esperando="origen"; agregarMensaje("bot","Indica origen."); }
        else { await guardarCotizacion(); }
        return;
      }
      if(flujoActual.esperando==="origen"){ d.origen=input.trim(); flujoActual.esperando="destino"; agregarMensaje("bot","Indica destino."); return; }
      if(flujoActual.esperando==="destino"){ d.destino=input.trim(); flujoActual.esperando="cantidad_viajes"; agregarMensaje("bot","Indica cantidad de viajes."); return; }
      if(flujoActual.esperando==="cantidad_viajes"){
        const n = Number(input); if(!n || n<=0){ agregarMensaje("bot","Cantidad inválida."); return; }
        d.cantidad_viajes=String(n); flujoActual.esperando="valor_viaje"; agregarMensaje("bot","Indica valor por viaje."); return;
      }
      if(flujoActual.esperando==="valor_viaje"){
        const n = Number(String(input).replace(/[^\d.]/g,""));
        if(!n || n<=0){ agregarMensaje("bot","Valor inválido."); return; }
        d.valor_viaje=String(n); await guardarCotizacion(); return;
      }
    }

        logErr("guardarCotizacion", e);
        agregarMensaje("system","Error de red al crear cotización.");

    async function continuarFlujoAlquiler(input){
      const d = flujoActual.data;

      if(flujoActual.esperando==="cliente_busqueda"){
        try{
          const b = escPostgrest(input);
          if(!b){ agregarMensaje("bot","Escribe nombre o NIT del cliente."); return; }
          const { data, error } = await sb
            .from("clientes")
            .select("id,nombre_empresa")
            .eq("empresa_id",empresa_id)
            .or(`nombre_empresa.ilike.%${b}%,nit.ilike.%${b}%`)
            .limit(1);

          if(error){ logErr("buscar cliente alq", error); agregarMensaje("system","Error consultando clientes."); return; }
          if(!data || !data.length){
            agregarMensaje("bot","No encontré cliente. Escribe 'crear cliente' para registrarlo o 'cancelar' para salir.");
            return;
          }

          d.cliente_id = data[0].id;
          flujoActual.esperando = "equipo_id";

          try{
            const mq = await sb.from("maquinas")
              .select("id,marca,modelo,estado")
              .eq("empresa_id",empresa_id).eq("estado","disponible")
              .limit(20);
            renderMini("Máquinas disponibles", mq.data||[], ["id","marca","modelo","estado"]);
          }catch(e){ logErr("listar maq disp", e); }
          agregarMensaje("bot","Indica ID del equipo (copia exactamente el ID de la tabla).");
          return;
        }catch(e){
          logErr("continuarFlujoAlquiler cliente", e);
          agregarMensaje("system","Error de red buscando cliente para alquiler.");
          return;
        }
      }

      if(flujoActual.esperando==="equipo_id"){
        const ref = input.trim();
        if(!ref){ agregarMensaje("bot","Indica un ID válido de máquina."); return; }
        try{
          const { data, error } = await sb.from("maquinas")
            .select("id,estado").eq("empresa_id",empresa_id).eq("id",ref).maybeSingle();
          if(error){ logErr("validar maq", error); agregarMensaje("system","Error validando máquina."); return; }
          if(!data){ agregarMensaje("bot","No encontré esa máquina. Indica otro ID."); return; }
          if(data.estado !== "disponible"){
            agregarMensaje("bot",`Máquina no disponible (estado: ${data.estado}). Elige otra ID disponible.`);
            return;
          }
          d.equipo_id = ref;
        }catch(e){
          logErr("validar maq net", e);
          agregarMensaje("system","Error de red validando máquina.");
          return;
        }
        flujoActual.esperando = "fecha_inicio";
        agregarMensaje("bot","Indica fecha_inicio (YYYY-MM-DD).");
        return;
      }

      if(flujoActual.esperando==="fecha_inicio"){
        const v = input.trim();
        if(!/^\d{4}-\d{2}-\d{2}$/.test(v)){ agregarMensaje("bot","Formato inválido. Usa YYYY-MM-DD."); return; }
        d.fecha_inicio=v; flujoActual.esperando="fecha_fin"; agregarMensaje("bot","Indica fecha_fin (YYYY-MM-DD)."); return;
      }
      if(flujoActual.esperando==="fecha_fin"){
        const v = input.trim();
        if(!/^\d{4}-\d{2}-\d{2}$/.test(v)){ agregarMensaje("bot","Formato inválido. Usa YYYY-MM-DD."); return; }
        if(v < d.fecha_inicio){ agregarMensaje("bot","fecha_fin no puede ser menor que fecha_inicio."); return; }
        d.fecha_fin=v; flujoActual.esperando="dias"; agregarMensaje("bot","Indica días."); return;
      }
      if(flujoActual.esperando==="dias"){
        const n = Number(input); if(!n || n<=0){ agregarMensaje("bot","Días inválido."); return; }
        d.dias=String(n); flujoActual.esperando="precio"; agregarMensaje("bot","Indica precio por día."); return;
      }
      if(flujoActual.esperando==="precio"){
        const n = Number(String(input).replace(/[^\d.]/g,""));
        if(!n || n<=0){ agregarMensaje("bot","Precio inválido."); return; }
        d.precio=String(n); await guardarAlquiler(); return;
      }
    }

    async function guardarAlquiler(){
      const d = flujoActual.data;
      try{
        if(!d.cliente_id || !d.equipo_id || !d.fecha_inicio){
          agregarMensaje("system","Datos incompletos para el alquiler.");
          flujoActual = null; return;
        }

        // Re-validar que la máquina siga disponible justo antes de insertar
        const { data: mq, error: emq } = await sb.from("maquinas")
          .select("id,estado").eq("empresa_id",empresa_id).eq("id",d.equipo_id).maybeSingle();
        if(emq){ logErr("revalidar maq", emq); agregarMensaje("system","Error validando máquina."); flujoActual=null; return; }
        if(!mq || mq.estado !== "disponible"){
          agregarMensaje("bot","La máquina ya no está disponible. Intenta con otra.");
          flujoActual = null; return;
        }

        const payload = {
          empresa_id,
          cliente_id: d.cliente_id,
          equipoId: d.equipo_id,
          fechaInicio: d.fecha_inicio,
          fecha_fin: d.fecha_fin || null,
          dias: Number(d.dias) || 0,
          precioDia: Number(d.precio) || 0,
          estado: "activo",
          created_by: user_id
        };

        const { data, error } = await sb
          .from("alquileres_ops")
          .insert([payload])
          .select("id,estado,equipoId")
          .single();
        if(error || !data){
          logErr("insert alquileres_ops", error);
          agregarMensaje("system","No pude crear el alquiler. Revisa los datos.");
          flujoActual=null; return;
        }

        // Actualizar máquina a "trabajando"
        const { error: euMaq } = await sb
          .from("maquinas")
          .update({ estado:"trabajando", cliente_id:d.cliente_id, fecha_inicio:d.fecha_inicio, fecha_vence:d.fecha_fin||null, alquiler_nro:data.id })
          .eq("empresa_id", empresa_id)
          .eq("id", d.equipo_id);

        if(euMaq){
          logErr("update maquina tras alquiler", euMaq);
          agregarMensaje("system",`Alquiler ${data.id} creado, pero no pude actualizar la máquina. Revísala manualmente.`);
        }else{
          agregarMensaje("bot",`Alquiler creado correctamente.\nID: ${data.id}\nEstado: ${data.estado}\nMáquina ${d.equipo_id} marcada como trabajando.`);
        }
      }catch(e){
        logErr("guardarAlquiler", e);
        agregarMensaje("system","Error de red al crear alquiler.");
      }
      flujoActual = null;
    }

      }

      const d = flujoActual.data;
      const e = normalizarTexto(d.estado);
      const ok = ["disponible","trabajando","mantenimiento","varado","baja"];
      if(!ok.includes(e)){
        agregarMensaje("bot",`Estado inválido. Usa: ${ok.join(", ")}.`);

      try{
        const ref = escPostgrest(d.ref);
        if(!ref){ agregarMensaje("system","Referencia de máquina vacía."); flujoActual=null; return; }

        // Buscar por id exacto o por marca/modelo
        const { data: found, error: eF } = await sb.from("maquinas")
          .select("id,marca,modelo,estado").eq("empresa_id",empresa_id)
          .or(`id.eq.${ref},marca.ilike.%${ref}%,modelo.ilike.%${ref}%`)
          .limit(1);
        if(eF){ logErr("buscar maq estado", eF); agregarMensaje("system","No pude buscar la máquina."); flujoActual=null; return; }
        if(!found || !found.length){
          agregarMensaje("bot","No encontré ninguna máquina con esa referencia.");
          flujoActual=null; return;
        }

        const maqId = found[0].id;

        // Si pasa a "trabajando" sin alquiler activo, advertir (no bloqueo)
        const { data: upd, error: eU } = await sb.from("maquinas")
          .update({estado:e})
          .eq("empresa_id",empresa_id).eq("id", maqId)
          .select("id,marca,modelo,estado").maybeSingle();
        if(eU || !upd){
          logErr("update estado maq", eU);
          agregarMensaje("system","No pude cambiar el estado de la máquina.");
          flujoActual=null; return;
        }
        agregarMensaje("bot",`Estado actualizado: ${upd.id} (${upd.marca||""} ${upd.modelo||""}) → ${upd.estado}`);
      }catch(e){
        logErr("cambiarEstadoMaquina", e);
        agregarMensaje("system","Error de red cambiando estado de máquina.");
      }
      flujoActual = null;
    }

    // ============================================================
    // ASIGNAR MÁQUINA A ALQUILER
    // ============================================================
    async function asignarMaquinaAlquiler(){
      if(!flujoActual || flujoActual.tipo!=="asignar_maquina"){
        flujoActual = { tipo:"asignar_maquina", data:{alquiler_id:"",maquina_id:""}, esperando:"alquiler_id" };
        agregarMensaje("bot","Indica ID del alquiler.");
        return;
      }
      if(flujoActual.esperando==="alquiler_id"){
        if(!flujoActual.data.alquiler_id){ agregarMensaje("bot","ID de alquiler vacío."); flujoActual=null; return; }
        // Validar que el alquiler exista y sea de la empresa
        try{
          const { data: alq, error } = await sb.from("alquileres_ops")
            .select("id,estado").eq("empresa_id",empresa_id)
            .eq("id", flujoActual.data.alquiler_id).maybeSingle();
          if(error){ logErr("validar alq", error); agregarMensaje("system","Error validando alquiler."); flujoActual=null; return; }
          if(!alq){ agregarMensaje("bot","No encontré ese alquiler."); flujoActual=null; return; }
        }catch(e){ logErr("validar alq net", e); agregarMensaje("system","Error de red."); flujoActual=null; return; }

        flujoActual.esperando = "maquina_id";
        try{
          const { data } = await sb.from("maquinas")
            .select("id,marca,modelo").eq("empresa_id",empresa_id)
            .eq("estado","disponible").limit(20);
          renderMini("Máquinas disponibles", data||[], ["id","marca","modelo"]);
        }catch(e){ logErr("listar maq disp2", e); }
        agregarMensaje("bot","Indica ID de la máquina a asignar.");
        return;
      }

      const d = flujoActual.data;
      try{
        if(!d.alquiler_id || !d.maquina_id){
          agregarMensaje("system","Datos incompletos.");
          flujoActual=null; return;
        }

        // Validar que la máquina esté disponible
        const { data: mq, error: eMq } = await sb.from("maquinas")
          .select("id,estado").eq("empresa_id",empresa_id).eq("id",d.maquina_id).maybeSingle();
        if(eMq){ logErr("validar maq asig", eMq); agregarMensaje("system","Error validando máquina."); flujoActual=null; return; }
        if(!mq){ agregarMensaje("bot","No encontré esa máquina."); flujoActual=null; return; }
        if(mq.estado !== "disponible"){
          agregarMensaje("bot",`Máquina no disponible (estado: ${mq.estado}). No se puede asignar.`);
          flujoActual=null; return;
        }

        const { error:e1 } = await sb.from("alquileres_ops")
          .update({equipoId:d.maquina_id,estado:"activo"})
          .eq("empresa_id",empresa_id).eq("id",d.alquiler_id);
        if(e1){
          logErr("asignar update alq", e1);
          agregarMensaje("system","No pude asignar máquina al alquiler.");
          flujoActual=null; return;
        }

        const { error:e2 } = await sb.from("maquinas")
          .update({estado:"trabajando",alquiler_nro:d.alquiler_id})
          .eq("empresa_id",empresa_id).eq("id",d.maquina_id);
        if(e2){
          logErr("asignar update maq", e2);
          agregarMensaje("system",`Alquiler actualizado pero la máquina no. Revísala manualmente.`);
          flujoActual=null; return;
        }

        agregarMensaje("bot",`Máquina ${d.maquina_id} asignada al alquiler ${d.alquiler_id}.`);
      }catch(e){
        logErr("asignarMaquinaAlquiler", e);
        agregarMensaje("system","Error de red asignando máquina.");
      }
      flujoActual = null;
    }

    // ============================================================
    // RENDER DE TABLA
    // ============================================================
    function esc(s){
      return String(s==null?"":s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }
    function renderMini(titulo,rows,cols){
      if(!rows || !rows.length){ agregarMensaje("bot",`${esc(titulo)}\nSin resultados.`,true); return; }
      const head = cols.map(c=>`<th>${esc(c)}</th>`).join("");
      const body = rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r && r[c]!==undefined && r[c]!==null ? r[c] : "")}</td>`).join("")}</tr>`).join("");
      agregarMensaje("bot",`${esc(titulo)}<table class="mini-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`,true);
    }

    // ============================================================
    // INTÉRPRETE CENTRAL
    // ============================================================
    async function interpretarMensaje(texto){
      const txt = (texto||"").trim();
      if(!txt){ agregarMensaje("bot","Escribe un comando."); return; }
      if(!empresa_id){ agregarMensaje("system","Sesión sin empresa. Vuelve a iniciar sesión."); return; }

      // Cancelar flujo activo
      if(flujoActual && /^(cancelar|salir|abortar|cancel)$/i.test(txt)){
        flujoActual = null;
        agregarMensaje("bot","Flujo cancelado.");
        return;
      }

      // Flujo activo: procesar input sin typing (evita mensaje fantasma)
      if(flujoActual){
        try{
          if(flujoActual.tipo==="crear_cliente"){ await continuarFlujoCliente(txt); return; }
          if(flujoActual.tipo==="crear_cotizacion"){ await continuarFlujoCotizacion(txt); return; }
          if(flujoActual.tipo==="crear_alquiler"){ await continuarFlujoAlquiler(txt); return; }
          if(flujoActual.tipo==="cambiar_estado_maquina"){
            if(flujoActual.esperando==="ref") flujoActual.data.ref=txt;
            else flujoActual.data.estado=txt;
            await cambiarEstadoMaquina(); return;
          }
          if(flujoActual.tipo==="asignar_maquina"){
            if(flujoActual.esperando==="alquiler_id") flujoActual.data.alquiler_id=txt;
            else flujoActual.data.maquina_id=txt;
            await asignarMaquinaAlquiler(); return;
          }
        }catch(e){
          logErr("flujo activo", e);
          flujoActual = null;
          agregarMensaje("system","Error procesando el flujo. Flujo cancelado.");
          return;
        }
      }

      // Detección de intención con typing indicator
      const t = mostrarTyping();
      const it = detectarIntencion(txt);

      if(["crear_cliente","crear_cotizacion","crear_alquiler","asignar_maquina","cambiar_estado_maquina"].includes(it.type)){
        if(!puedeEjecutarAccion(it.type)){
          t.stop("No tienes permisos para esa acción.");
          return;
        }
      }
      if(it.type.startsWith("consultar_") && !puedeEjecutarAccion(it.type)){
        t.stop("No tienes permisos para esa consulta.");
        return;
      }

      try{
        t.remove();
        if(it.type==="crear_cliente"){ await iniciarFlujoCliente(txt); return; }
        if(it.type==="crear_cotizacion"){ iniciarFlujoCotizacion(); return; }
        if(it.type==="crear_alquiler"){ iniciarFlujoAlquiler(); return; }
        if(it.type==="consultar_alquileres"){ await consultarAlquileres(it.filtro); return; }
        if(it.type==="consultar_cotizaciones"){ await consultarCotizaciones(it.filtro); return; }
        if(it.type==="consultar_maquinas"){ await consultarMaquinas(it.filtro); return; }
        if(it.type==="consultar_clientes"){ await consultarClientes(it.busqueda||""); return; }
        if(it.type==="consultar_finanzas"){ await consultarFinanzas(); return; }
        if(it.type==="consultar_resumen"){ await consultarResumenGeneral(); return; }
        if(it.type==="cambiar_estado_maquina"){ await cambiarEstadoMaquina(); return; }
        if(it.type==="asignar_maquina"){ await asignarMaquinaAlquiler(); return; }
        agregarMensaje("bot","No entendí. Usa: crear cliente, crear cotización, crear alquiler, alquileres activos, cotizaciones aprobadas, máquinas disponibles, finanzas, resumen.");
      }catch(e){
        logErr("interpretarMensaje", e);
        agregarMensaje("system","Error ejecutando la solicitud.");
      }
    }

    // ============================================================
    // BIND UI
    // ============================================================
    async function handleSend(){
      const i = document.getElementById("chatInput");
      const t = i.value.trim();
      if(!t) return;
      agregarMensaje("user",t);
      i.value="";
      await interpretarMensaje(t);
    }

    function bindUI(){
      document.getElementById("btnLogin").addEventListener("click", login);
      document.getElementById("loginPassword").addEventListener("keydown",(e)=>{ if(e.key==="Enter") login(); });
      document.getElementById("loginEmail").addEventListener("keydown",(e)=>{ if(e.key==="Enter") document.getElementById("loginPassword").focus(); });
      document.getElementById("btnLogout").addEventListener("click", logout);
      document.getElementById("btnSend").addEventListener("click", handleSend);
      document.getElementById("chatInput").addEventListener("keydown",(e)=>{
        if(e.key==="Enter"){ e.preventDefault(); handleSend(); }
      });
      document.querySelectorAll("#quickActions .qbtn").forEach(b=>{
        b.addEventListener("click", async ()=>{
          const q = b.getAttribute("data-q")||"";
          agregarMensaje("user",q);
          await interpretarMensaje(q);
        });
      });
    }

    // ============================================================
    // ARRANQUE
    // ============================================================
    bindUI();
    initApp();
  })();
  </script>
</body>
</html>
