<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALCON OPS Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0b1220; --line:#21304d; --txt:#e8eefc; --muted:#98a8c7;
      --pri:#2f7cff; --pri2:#1f5fd1; --bot:#16233b; --usr:#2f7cff;
      --warn:#f59e0b; --ok:#10b981; --err:#ef4444;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0b1220;color:var(--txt)}
    .app{height:100%;display:flex;align-items:center;justify-content:center;padding:16px}
    .panel{width:min(1100px,100%);height:min(92vh,900px);display:grid;grid-template-columns:320px 1fr;background:#0f1728;border:1px solid var(--line);border-radius:16px;overflow:hidden}
    .left{border-right:1px solid var(--line);display:flex;flex-direction:column}
    .brand{padding:18px;border-bottom:1px solid var(--line)}
    .brand h1{margin:0;font-size:18px}
    .brand p{margin:6px 0 0;color:var(--muted);font-size:12px}
    .ctx{padding:14px 18px;border-bottom:1px solid var(--line);display:grid;gap:6px}
    .ctx .kv{font-size:12px;color:var(--muted)}
    .ctx .kv b{color:var(--txt)}
    .quick{padding:14px;display:grid;gap:8px;overflow:auto}
    .qbtn{border:1px solid #2a3b60;background:#13203a;color:#dbe7ff;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:600;cursor:pointer;text-align:left}
    .qbtn:hover{background:#1a2b4a}
    .right{display:flex;flex-direction:column;min-width:0}
    .top{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .badge{font-size:11px;padding:4px 10px;border:1px solid #314a7a;border-radius:999px;background:#1a2744;color:#bcd0ff}
    .messages{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
    .msg-wrap{display:flex}
    .msg-wrap.user{justify-content:flex-end}
    .msg{max-width:min(82%,700px);padding:10px 12px;border-radius:12px;font-size:14px;line-height:1.45;white-space:pre-wrap;word-break:break-word;border:1px solid transparent}
    .msg.bot{background:var(--bot);border-color:#263b62}
    .msg.user{background:var(--usr);color:#fff}
    .msg.system{background:#2a1f10;border-color:#5f4215;color:#ffd9a1}
    .input{border-top:1px solid var(--line);padding:10px;display:flex;gap:10px}
    .input input{flex:1;background:#111d34;border:1px solid #2a3f69;color:#e5eeff;border-radius:10px;padding:11px 12px;font-size:14px;outline:none}
    .input button{background:var(--pri);border:0;color:#fff;border-radius:10px;padding:0 16px;font-weight:700;cursor:pointer}
    .input button:hover{background:var(--pri2)}
    .login-wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:20px}
    .login{width:min(420px,100%);background:#0f1728;border:1px solid var(--line);border-radius:14px;padding:20px}
    .login h2{margin:0 0 8px}
    .login p{margin:0 0 14px;color:var(--muted);font-size:13px}
    .f{display:grid;gap:8px;margin-bottom:12px}
    .f label{font-size:12px;color:#b8c7e6}
    .f input{background:#101a2f;border:1px solid #2a3b61;color:#eaf1ff;border-radius:10px;padding:10px 11px;font-size:14px;outline:none}
    .login button{width:100%;height:42px;border:0;border-radius:10px;background:var(--pri);color:#fff;font-weight:700;cursor:pointer}
    .err{margin-top:10px;color:#ffb4b4;font-size:12px;min-height:16px}
    .hidden{display:none!important}
    .mini-table{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px}
    .mini-table th,.mini-table td{border-bottom:1px solid #2a3f67;padding:6px 4px;text-align:left}
    .mini-table th{color:#a8bee8;font-weight:600}
    .typing{display:inline-flex;gap:5px;align-items:center}
    .typing i{width:7px;height:7px;border-radius:50%;background:#9db7f3;display:inline-block;animation:blink 1.1s infinite}
    .typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
    @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-2px)}}
    @media(max-width:920px){.panel{grid-template-columns:1fr}.left{display:none}}
  </style>
</head>
<body>
  <div class="app">
    <div id="loginScreen" class="login-wrap">
      <div class="login">
        <h2>ALCON OPS</h2>
        <p>Acceso al asistente operativo</p>
        <div class="f"><label>Correo</label><input id="loginEmail" type="email" autocomplete="username" /></div>
        <div class="f"><label>Contraseña</label><input id="loginPassword" type="password" autocomplete="current-password" /></div>
        <button id="btnLogin">Ingresar</button>
        <div id="loginError" class="err"></div>
      </div>
    </div>

    <div id="chatScreen" class="panel hidden">
      <aside class="left">
        <div class="brand"><h1>ALCON OPS · Chatbot</h1><p>Asistente operativo de empresa</p></div>
        <div class="ctx">
          <div class="kv">Usuario: <b id="ctxUser">-</b></div>
          <div class="kv">Empresa: <b id="ctxEmpresa">-</b></div>
          <div class="kv">Rol: <b id="ctxRol">-</b></div>
        </div>
        <div class="quick" id="quickActions">
          <button class="qbtn" data-q="crear cliente">Crear cliente</button>
          <button class="qbtn" data-q="crear cotización">Crear cotización</button>
          <button class="qbtn" data-q="crear alquiler">Crear alquiler</button>
          <button class="qbtn" data-q="alquileres activos">Alquileres activos</button>
          <button class="qbtn" data-q="cotizaciones aprobadas">Cotizaciones aprobadas</button>
          <button class="qbtn" data-q="máquinas disponibles">Máquinas disponibles</button>
          <button class="qbtn" data-q="resumen del día">Resumen</button>
          <button class="qbtn" data-q="finanzas">Finanzas</button>
        </div>
      </aside>
      <section class="right">
        <div class="top"><div>Asistente Operativo</div><div class="badge">Conectado</div></div>
        <div id="messages" class="messages"></div>
        <div class="input"><input id="chatInput" placeholder="Escribe una consulta o comando..." /><button id="btnSend">Enviar</button></div>
      </section>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://oguxdohmutqgacahcwop.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ndXhkb2htdXRxZ2FjYWhjd29wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mjc0NzcsImV4cCI6MjA4ODMwMzQ3N30.RRruTo8B7k4R97Igq7_KV1PV58FqrpIzEu0R_MXIwR8";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let empresa_id = null;
    let rol_usuario = null;
    let flujoActual = null;
    let user_id = null;
    let empresa_nombre = "";
    let usuario_email = "";

    function fmt(n){ return (Number(n) || 0).toLocaleString("es-CO"); }
    function normalizarTexto(t){ return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim(); }

    function initSupabase(){
      if(!SUPABASE_URL.includes("supabase.co") || SUPABASE_ANON_KEY === "TU-ANON-KEY"){
        document.getElementById("loginError").textContent = "Configura SUPABASE_URL y SUPABASE_ANON_KEY.";
      }
    }

    function agregarMensaje(tipo,texto,html=false){
      const box = document.getElementById("messages");
      const wrap = document.createElement("div");
      const msg = document.createElement("div");
      wrap.className = "msg-wrap " + (tipo==="user" ? "user" : "");
      msg.className = "msg " + (tipo==="user" ? "user" : (tipo==="system" ? "system" : "bot"));
      if(html) msg.innerHTML = texto; else msg.textContent = texto;
      wrap.appendChild(msg);
      box.appendChild(wrap);
      box.scrollTop = box.scrollHeight;
      return wrap;
    }

    function mostrarTyping(){
      const w = agregarMensaje("bot","");
      const m = w.querySelector(".msg");
      m.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>';
      return {
        stop: (t, h=false) => {
          if(h) m.innerHTML = t; else m.textContent = t;
          const box = document.getElementById("messages");
          box.scrollTop = box.scrollHeight;
        }
      };
    }

    function puedeEjecutarAccion(tipo){
      if(!rol_usuario) return false;
      if(rol_usuario === "superadmin" || rol_usuario === "admin_empresa") return true;
      const rol = normalizarTexto(rol_usuario);
      if(rol === "operaciones"){
        if(["crear_alquiler","asignar_maquina","cambiar_estado_maquina","consultar_alquileres","consultar_maquinas","consultar_clientes","consultar_finanzas","consultar_resumen"].includes(tipo)) return true;
        return false;
      }
      if(rol === "comercial"){
        if(["crear_cliente","crear_cotizacion","consultar_cotizaciones","consultar_clientes","consultar_resumen"].includes(tipo)) return true;
        return false;
      }
      return false;
    }

    async function login(){
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const err = document.getElementById("loginError");
      err.textContent = "";
      if(!email || !password){ err.textContent = "Ingresa correo y contraseña."; return; }

      try{
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if(error || !data?.user){ err.textContent = "Credenciales inválidas."; return; }
        await cargarContextoUsuario();
      }catch(_e){
        err.textContent = "Error de conexión con autenticación.";
      }
    }

    async function cargarContextoUsuario(){
      try{
        const { data: au, error: ae } = await supabase.auth.getUser();
        if(ae || !au?.user){ document.getElementById("loginError").textContent = "No se pudo validar sesión."; return; }
        user_id = au.user.id;
        usuario_email = au.user.email || "";

        const { data: ue, error: eue } = await supabase
          .from("usuarios_empresas")
          .select("user_id,empresa_id,rol,empresa:empresas(nombre)")
          .eq("user_id", user_id)
          .maybeSingle();

        if(eue || !ue?.empresa_id){
          document.getElementById("loginError").textContent = "Usuario sin empresa asignada.";
          await supabase.auth.signOut();
          return;
        }

        empresa_id = ue.empresa_id;
        rol_usuario = ue.rol || "operaciones";
        empresa_nombre = ue.empresa?.nombre || "Empresa";
        mostrarChat();
      }catch(_e){
        document.getElementById("loginError").textContent = "No se pudo cargar el contexto.";
      }
    }

    function mostrarChat(){
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("chatScreen").classList.remove("hidden");
      document.getElementById("ctxUser").textContent = usuario_email || user_id || "-";
      document.getElementById("ctxEmpresa").textContent = empresa_nombre || "-";
      document.getElementById("ctxRol").textContent = rol_usuario || "-";
      agregarMensaje("bot","Hola. Estoy listo para operar tu empresa.");
      agregarMensaje("bot","Comandos: crear cliente, crear cotización, crear alquiler, alquileres activos, máquinas disponibles, finanzas, resumen.");
    }

    function detectarIntencion(texto){
      let x = normalizarTexto(texto);
      x = x
        .replace(/\ben marcha\b|\bvigente\b|\btrabajando\b/g,"activo")
        .replace(/\blibre\b/g,"disponible")
        .replace(/\baceptada\b/g,"aprobada")
        .replace(/\brenta\b/g,"alquiler")
        .replace(/\bequipo\b/g,"maquina")
        .replace(/\bcrear empresa\b/g,"crear cliente")
        .replace(/\bcoti\b/g,"cotizacion")
        .replace(/\bn\.?\s*i\.?\s*t\b|\bn it\b|\bni\b/g,"nit");

      if(/crear cliente|nuevo cliente/.test(x)) return {type:"crear_cliente"};
      if(/crear cotizacion|nueva cotizacion/.test(x)) return {type:"crear_cotizacion"};
      if(/crear alquiler|nuevo alquiler/.test(x)) return {type:"crear_alquiler"};
      if(/asignar maquina/.test(x)) return {type:"asignar_maquina"};
      if(/cambiar estado.*maquina|estado.*maquina/.test(x)) return {type:"cambiar_estado_maquina"};

      if(/alquiler/.test(x)){
        if(/por vencer|vencer/.test(x)) return {type:"consultar_alquileres",filtro:"por_vencer"};
        if(/reservado/.test(x)) return {type:"consultar_alquileres",filtro:"reservado"};
        if(/finalizado/.test(x)) return {type:"consultar_alquileres",filtro:"finalizado"};
        if(/pendiente.*recogida/.test(x)) return {type:"consultar_alquileres",filtro:"pendiente_recogida"};
        return {type:"consultar_alquileres",filtro:"activo"};
      }

      if(/cotizacion/.test(x)){
        const es = ["borrador","en_revision","enviada","aprobada","negociacion","rechazada","perdida","vencida","reabierta","cancelada"];
        for(const e of es){ if(x.includes(e.replace("_"," "))) return {type:"consultar_cotizaciones",filtro:e}; }
        return {type:"consultar_cotizaciones",filtro:"aprobada"};
      }

      if(/maquina|equipos?/.test(x)){
        if(/disponible/.test(x)) return {type:"consultar_maquinas",filtro:"disponible"};
        if(/mantenimiento/.test(x)) return {type:"consultar_maquinas",filtro:"mantenimiento"};
        if(/varad/.test(x)) return {type:"consultar_maquinas",filtro:"varado"};
        if(/trabajando|activo/.test(x)) return {type:"consultar_maquinas",filtro:"trabajando"};
        return {type:"consultar_maquinas",filtro:"disponible"};
      }

      if(/finanza|ingreso|gasto|caja|balance/.test(x)) return {type:"consultar_finanzas"};
      if(/resumen|estado general|que tengo hoy|hoy/.test(x)) return {type:"consultar_resumen"};
      if(/cliente/.test(x)){ const m = x.match(/cliente\s+(.+)/); return {type:"consultar_clientes",busqueda:m?m[1].trim():""}; }

      return {type:"desconocida"};
    }

    function extraerDatosCliente(texto){
      const t = texto || "";
      const n = normalizarTexto(texto);
      const o = {};
      const nit = n.match(/(?:nit)\s*[:#-]?\s*(\d{5,15})/i);
      const tel = n.match(/(?:telefono|tel|celular|movil)\s*[:#-]?\s*(\+?\d{7,15})/i);
      const cor = t.match(/[a-zA-Z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/i);
      const nom = t.match(/(?:nombre|empresa|cliente)\s*[:#-]?\s*([a-zA-Z0-9ÁÉÍÓÚÑáéíóúñ .,&-]{3,})/i);
      const con = t.match(/(?:contacto)\s*[:#-]?\s*([a-zA-ZÁÉÍÓÚÑáéíóúñ .-]{3,})/i);
      const car = t.match(/(?:cargo)\s*[:#-]?\s*([a-zA-ZÁÉÍÓÚÑáéíóúñ .-]{3,})/i);
      const dir = t.match(/(?:direccion|dirección)\s*[:#-]?\s*([a-zA-Z0-9ÁÉÍÓÚÑáéíóúñ #.,-]{5,})/i);
      const ciu = t.match(/(?:ciudad)\s*[:#-]?\s*([a-zA-ZÁÉÍÓÚÑáéíóúñ .-]{3,})/i);
      const obs = t.match(/(?:obs|observacion|observación)\s*[:#-]?\s*(.+)$/i);

      if(nit) o.nit = nit[1];
      if(tel) o.telefono = tel[1];
      if(cor) o.correo = cor[0];
      if(nom) o.nombre_empresa = nom[1].trim();
      if(con) o.contacto = con[1].trim();
      if(car) o.cargo = car[1].trim();
      if(dir) o.direccion = dir[1].trim();
      if(ciu) o.ciudad = ciu[1].trim();
      if(obs) o.obs = obs[1].trim();
      return o;
    }

    function iniciarFlujoCliente(txt=""){
      flujoActual = { tipo:"crear_cliente", data:{ nombre_empresa:"",nit:"",telefono:"",correo:"",contacto:"",cargo:"",direccion:"",ciudad:"",obs:"" } };
      if(txt) Object.assign(flujoActual.data, extraerDatosCliente(txt));
      continuarFlujoCliente("");
    }

    async function continuarFlujoCliente(input){
      if(!flujoActual || flujoActual.tipo!=="crear_cliente") return;
      if(input){
        const ex = extraerDatosCliente(input);
        Object.assign(flujoActual.data, ex);
        if(flujoActual.esperandoCampo && !ex[flujoActual.esperandoCampo]){
          flujoActual.data[flujoActual.esperandoCampo] = input.trim();
        }
      }

      const d = flujoActual.data;
      const falt = [];
      ["nombre_empresa","nit","telefono","correo","contacto","cargo","direccion","ciudad","obs"].forEach(k=>{ if(!d[k]) falt.push(k); });
      if(falt.length){
        const q = {
          nombre_empresa:"Necesito el nombre de la empresa cliente.",
          nit:"Necesito el NIT del cliente.",
          telefono:"Necesito el teléfono del cliente.",
          correo:"Necesito el correo del cliente.",
          contacto:"Necesito el nombre del contacto.",
          cargo:"Necesito el cargo del contacto.",
          direccion:"Necesito la dirección.",
          ciudad:"Necesito la ciudad.",
          obs:"Agrega observación (o: sin observaciones)."
        };
        flujoActual.esperandoCampo = falt[0];
        agregarMensaje("bot", q[falt[0]]);
        return;
      }

      if(!/^\d{5,15}$/.test(d.nit)){ flujoActual.esperandoCampo="nit"; agregarMensaje("bot","NIT inválido. Escribe solo números (5 a 15 dígitos)."); return; }
      await guardarCliente();
    }

    async function guardarCliente(){
      const d = flujoActual.data;
      if(/sin observaciones/i.test(d.obs)) d.obs = "";
      try{
        const { data, error } = await supabase
          .from("clientes")
          .insert([{ empresa_id, nombre_empresa:d.nombre_empresa, nit:d.nit, telefono:d.telefono, correo:d.correo, contacto:d.contacto, cargo:d.cargo, direccion:d.direccion, ciudad:d.ciudad, obs:d.obs }])
          .select("id,nombre_empresa,nit")
          .single();
        if(error || !data){ agregarMensaje("system","No pude crear el cliente."); flujoActual=null; return; }
        agregarMensaje("bot",`Cliente creado correctamente.\nID: ${data.id}\n${data.nombre_empresa} · NIT ${data.nit}`);
        agregarMensaje("bot","¿Quieres crear cotización o crear alquiler?");
      }catch(_e){
        agregarMensaje("system","Error de red al crear cliente.");
      }
      flujoActual = null;
    }

    function iniciarFlujoCotizacion(){
      flujoActual = { tipo:"crear_cotizacion", data:{ cliente_id:"",tipo:"",altura:"",dias:"",precio:"",modalidad:"",origen:"",destino:"",cantidad_viajes:"",valor_viaje:"" }, esperando:"cliente_busqueda" };
      agregarMensaje("bot","Indica cliente (nombre o NIT) para la cotización.");
    }

    async function guardarCotizacion(){
      const d = flujoActual.data;
      try{
        const payload = {
          empresa_id,
          cliente_id:d.cliente_id,
          tipo:d.tipo,
          altura:Number(d.altura) || null,
          dias:Number(d.dias) || 0,
          precio:Number(d.precio) || 0,
          modalidad:d.modalidad || "alquiler_dia",
          origen:d.modalidad==="transporte_viaje" ? d.origen : null,
          destino:d.modalidad==="transporte_viaje" ? d.destino : null,
          cantidadViajes:d.modalidad==="transporte_viaje" ? (Number(d.cantidad_viajes)||0) : 0,
          valorViaje:d.modalidad==="transporte_viaje" ? (Number(d.valor_viaje)||0) : 0,
          estado:"borrador",
          created_by:user_id
        };
        const { data, error } = await supabase.from("cotizaciones").insert([payload]).select("id,estado").single();
        if(error || !data){ agregarMensaje("system","No pude crear la cotización."); flujoActual=null; return; }
        agregarMensaje("bot",`Cotización creada correctamente.\nID: ${data.id}\nEstado: ${data.estado}`);
      }catch(_e){
        agregarMensaje("system","Error de red al crear cotización.");
      }
      flujoActual = null;
    }

    function iniciarFlujoAlquiler(){
      flujoActual = { tipo:"crear_alquiler", data:{ cliente_id:"",equipo_id:"",fecha_inicio:"",fecha_fin:"",dias:"",precio:"" }, esperando:"cliente_busqueda" };
      agregarMensaje("bot","Indica cliente (nombre o NIT) para crear el alquiler.");
    }

    async function guardarAlquiler(){
      const d = flujoActual.data;
      try{
        const payload = {
          empresa_id,
          cliente_id:d.cliente_id,
          equipoId:d.equipo_id,
          fechaInicio:d.fecha_inicio,
          fecha_fin:d.fecha_fin || null,
          dias:Number(d.dias) || 0,
          precioDia:Number(d.precio) || 0,
          estado:"activo",
          created_by:user_id
        };

        const { data, error } = await supabase.from("alquileres_ops").insert([payload]).select("id,estado,equipoId").single();
        if(error || !data){ agregarMensaje("system","No pude crear el alquiler."); flujoActual=null; return; }

        if(d.equipo_id){
          await supabase
            .from("maquinas")
            .update({ estado:"trabajando", cliente_id:d.cliente_id, fecha_inicio:d.fecha_inicio, fecha_vence:d.fecha_fin||null, alquiler_nro:data.id })
            .eq("empresa_id", empresa_id)
            .eq("id", d.equipo_id);
        }

        agregarMensaje("bot",`Alquiler creado correctamente.\nID: ${data.id}\nEstado: ${data.estado}`);
      }catch(_e){
        agregarMensaje("system","Error de red al crear alquiler.");
      }
      flujoActual = null;
    }

    async function consultarAlquileres(filtro="activo"){
      try{
        if(filtro==="por_vencer"){
          const lim = new Date(Date.now()+3*24*60*60*1000).toISOString().slice(0,10);
          const { data, error } = await supabase.from("alquileres_ops").select("id,estado,fechaInicio,fecha_fin,cliente_id,equipoId").eq("empresa_id",empresa_id).not("fecha_fin","is",null).lte("fecha_fin",lim).order("fecha_fin",{ascending:true}).limit(20);
          if(error) return agregarMensaje("system","No pude consultar alquileres por vencer.");
          return renderMini("Alquileres por vencer", data||[], ["id","estado","fechaInicio","fecha_fin","equipoId"]);
        }
        const { data, error } = await supabase.from("alquileres_ops").select("id,estado,fechaInicio,fecha_fin,cliente_id,equipoId").eq("empresa_id",empresa_id).eq("estado",filtro).order("id",{ascending:false}).limit(30);
        if(error) return agregarMensaje("system","No pude consultar alquileres.");
        renderMini(`Encontré ${(data||[]).length} alquileres ${filtro}.`, data||[], ["id","estado","fechaInicio","fecha_fin","equipoId"]);
      }catch(_e){
        agregarMensaje("system","Error de red en consulta de alquileres.");
      }
    }

    async function consultarCotizaciones(filtro="aprobada"){
      try{
        const { data, error } = await supabase.from("cotizaciones").select("id,estado,cliente_id,dias,precio,modalidad,created_at").eq("empresa_id",empresa_id).eq("estado",filtro).order("created_at",{ascending:false}).limit(30);
        if(error) return agregarMensaje("system","No pude consultar cotizaciones.");
        renderMini(`Encontré ${(data||[]).length} cotizaciones ${filtro}.`, data||[], ["id","estado","cliente_id","dias","precio","modalidad"]);
      }catch(_e){
        agregarMensaje("system","Error de red en consulta de cotizaciones.");
      }
    }

    async function consultarMaquinas(filtro="disponible"){
      try{
        const { data, error } = await supabase.from("maquinas").select("id,marca,modelo,estado,cliente_id,alquiler_nro").eq("empresa_id",empresa_id).eq("estado",filtro).order("id",{ascending:false}).limit(30);
        if(error) return agregarMensaje("system","No pude consultar máquinas.");
        renderMini(`Estas son las máquinas ${filtro}.`, data||[], ["id","marca","modelo","estado","alquiler_nro"]);
      }catch(_e){
        agregarMensaje("system","Error de red en consulta de máquinas.");
      }
    }

    async function consultarClientes(busqueda=""){
      try{
        let q = supabase.from("clientes").select("id,nombre_empresa,nit,telefono,ciudad").eq("empresa_id",empresa_id).order("nombre_empresa",{ascending:true}).limit(25);
        if(busqueda){ const b = busqueda.trim(); q = q.or(`nombre_empresa.ilike.%${b}%,nit.ilike.%${b}%`); }
        const { data, error } = await q;
        if(error) return agregarMensaje("system","No pude consultar clientes.");
        renderMini(`Encontré ${(data||[]).length} clientes.`, data||[], ["id","nombre_empresa","nit","telefono","ciudad"]);
      }catch(_e){
        agregarMensaje("system","Error de red en consulta de clientes.");
      }
    }

    async function consultarFinanzas(){
      try{
        const { data, error } = await supabase.from("caja_movimientos").select("id,tipo,monto,concepto,fecha").eq("empresa_id",empresa_id).order("fecha",{ascending:false}).limit(500);
        if(error) return agregarMensaje("system","No pude consultar finanzas.");
        let i=0,g=0;
        for(const m of (data||[])){ const v = Number(m.monto)||0; if((m.tipo||"").toLowerCase().includes("ingreso")) i+=v; else g+=v; }
        agregarMensaje("bot",`Finanzas:\nIngresos: $${fmt(i)}\nGastos: $${fmt(g)}\nBalance: $${fmt(i-g)}`);
      }catch(_e){
        agregarMensaje("system","Error de red en consulta financiera.");
      }
    }

    async function consultarResumenGeneral(){
      try{
        const [m1,m2,a1,c1,fin] = await Promise.all([
          supabase.from("maquinas").select("id",{count:"exact",head:true}).eq("empresa_id",empresa_id).eq("estado","disponible"),
          supabase.from("maquinas").select("id",{count:"exact",head:true}).eq("empresa_id",empresa_id).eq("estado","trabajando"),
          supabase.from("alquileres_ops").select("id",{count:"exact",head:true}).eq("empresa_id",empresa_id).eq("estado","activo"),
          supabase.from("cotizaciones").select("id",{count:"exact",head:true}).eq("empresa_id",empresa_id).in("estado",["borrador","en_revision","enviada","negociacion"]),
          supabase.from("caja_movimientos").select("tipo,monto").eq("empresa_id",empresa_id)
        ]);
        let i=0,g=0;
        for(const x of (fin.data||[])){ const n = Number(x.monto)||0; if((x.tipo||"").toLowerCase().includes("ingreso")) i+=n; else g+=n; }
        agregarMensaje("bot",`Resumen general:\nMáquinas disponibles: ${m1.count||0}\nMáquinas trabajando: ${m2.count||0}\nAlquileres activos: ${a1.count||0}\nCotizaciones pendientes: ${c1.count||0}\nIngresos: $${fmt(i)}\nGastos: $${fmt(g)}\nBalance: $${fmt(i-g)}`);
      }catch(_e){
        agregarMensaje("system","Error de red en resumen general.");
      }
    }

    async function cambiarEstadoMaquina(){
      if(!flujoActual || flujoActual.tipo!=="cambiar_estado_maquina"){
        flujoActual = { tipo:"cambiar_estado_maquina", data:{ref:"",estado:""}, esperando:"ref" };
        agregarMensaje("bot","Indica máquina (id, marca o modelo).");
        return;
      }
      if(flujoActual.esperando==="ref"){
        flujoActual.esperando="estado";
        agregarMensaje("bot","Ahora indica el nuevo estado: disponible, trabajando, mantenimiento o varado.");
        return;
      }

      const d = flujoActual.data;
      const e = normalizarTexto(d.estado);
      const ok = ["disponible","trabajando","mantenimiento","varado","baja"];
      if(!ok.includes(e)){ agregarMensaje("bot","Estado inválido."); flujoActual=null; return; }

      try{
        const ref = d.ref;
        const { data, error } = await supabase.from("maquinas").update({estado:e}).eq("empresa_id",empresa_id).or(`id.eq.${ref},marca.ilike.%${ref}%,modelo.ilike.%${ref}%`).select("id,marca,modelo,estado").limit(1);
        if(error || !data || !data.length){ agregarMensaje("system","No pude cambiar estado de máquina."); flujoActual=null; return; }
        agregarMensaje("bot",`Estado actualizado: ${data[0].id} → ${data[0].estado}`);
      }catch(_e){
        agregarMensaje("system","Error de red cambiando estado de máquina.");
      }
      flujoActual = null;
    }

    async function asignarMaquinaAlquiler(){
      if(!flujoActual || flujoActual.tipo!=="asignar_maquina"){
        flujoActual = { tipo:"asignar_maquina", data:{alquiler_id:"",maquina_id:""}, esperando:"alquiler_id" };
        agregarMensaje("bot","Indica ID del alquiler.");
        return;
      }
      if(flujoActual.esperando==="alquiler_id"){
        flujoActual.esperando = "maquina_id";
        try{
          const { data } = await supabase.from("maquinas").select("id,marca,modelo").eq("empresa_id",empresa_id).eq("estado","disponible").limit(20);
          renderMini("Máquinas disponibles", data||[], ["id","marca","modelo"]);
        }catch(_e){}
        agregarMensaje("bot","Indica ID de la máquina a asignar.");
        return;
      }

      const d = flujoActual.data;
      try{
        const { error:e1 } = await supabase.from("alquileres_ops").update({equipoId:d.maquina_id,estado:"activo"}).eq("empresa_id",empresa_id).eq("id",d.alquiler_id);
        const { error:e2 } = await supabase.from("maquinas").update({estado:"trabajando",alquiler_nro:d.alquiler_id}).eq("empresa_id",empresa_id).eq("id",d.maquina_id);
        if(e1 || e2){ agregarMensaje("system","No pude asignar máquina."); flujoActual=null; return; }
        agregarMensaje("bot","Máquina asignada correctamente.");
      }catch(_e){
        agregarMensaje("system","Error de red asignando máquina.");
      }
      flujoActual = null;
    }

    function renderMini(titulo,rows,cols){
      if(!rows || !rows.length){ agregarMensaje("bot",`${titulo}\nSin resultados.`); return; }
      const head = cols.map(c=>`<th>${c}</th>`).join("");
      const body = rows.map(r=>`<tr>${cols.map(c=>`<td>${(r && r[c]!==undefined && r[c]!==null) ? r[c] : ""}</td>`).join("")}</tr>`).join("");
      agregarMensaje("bot",`${titulo}<table class="mini-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`,true);
    }

    async function continuarFlujoCotizacion(input){
      const d = flujoActual.data;
      const x = normalizarTexto(input);

      if(flujoActual.esperando==="cliente_busqueda"){
        try{
          const { data, error } = await supabase
            .from("clientes")
            .select("id,nombre_empresa,nit")
            .eq("empresa_id",empresa_id)
            .or(`nombre_empresa.ilike.%${input}%,nit.ilike.%${input}%`)
            .limit(1);
          if(error || !data || !data.length){
            agregarMensaje("bot","No encontré cliente. Escribe 'crear cliente' para registrarlo.");
            return;
          }
          d.cliente_id = data[0].id;
          flujoActual.esperando = "tipo";
          agregarMensaje("bot",`Cliente: ${data[0].nombre_empresa}. Indica tipo.`);
          return;
        }catch(_e){
          agregarMensaje("system","Error de red buscando cliente.");
          return;
        }
      }

      if(flujoActual.esperando==="tipo"){ d.tipo=input; flujoActual.esperando="altura"; agregarMensaje("bot","Indica altura."); return; }
      if(flujoActual.esperando==="altura"){ d.altura=input; flujoActual.esperando="dias"; agregarMensaje("bot","Indica días."); return; }
      if(flujoActual.esperando==="dias"){ d.dias=input; flujoActual.esperando="precio"; agregarMensaje("bot","Indica precio."); return; }
      if(flujoActual.esperando==="precio"){ d.precio=input; flujoActual.esperando="modalidad"; agregarMensaje("bot","Indica modalidad: alquiler_dia o transporte_viaje."); return; }
      if(flujoActual.esperando==="modalidad"){
        d.modalidad = x.includes("transporte") ? "transporte_viaje" : "alquiler_dia";
        if(d.modalidad==="transporte_viaje"){ flujoActual.esperando="origen"; agregarMensaje("bot","Indica origen."); }
        else { await guardarCotizacion(); }
        return;
      }
      if(flujoActual.esperando==="origen"){ d.origen=input; flujoActual.esperando="destino"; agregarMensaje("bot","Indica destino."); return; }
      if(flujoActual.esperando==="destino"){ d.destino=input; flujoActual.esperando="cantidad_viajes"; agregarMensaje("bot","Indica cantidad de viajes."); return; }
      if(flujoActual.esperando==="cantidad_viajes"){ d.cantidad_viajes=input; flujoActual.esperando="valor_viaje"; agregarMensaje("bot","Indica valor por viaje."); return; }
      if(flujoActual.esperando==="valor_viaje"){ d.valor_viaje=input; await guardarCotizacion(); return; }
    }

    async function continuarFlujoAlquiler(input){
      const d = flujoActual.data;

      if(flujoActual.esperando==="cliente_busqueda"){
        try{
          const { data, error } = await supabase
            .from("clientes")
            .select("id,nombre_empresa")
            .eq("empresa_id",empresa_id)
            .or(`nombre_empresa.ilike.%${input}%,nit.ilike.%${input}%`)
            .limit(1);

          if(error || !data || !data.length){
            agregarMensaje("bot","No encontré cliente. Escribe 'crear cliente' para registrarlo.");
            return;
          }

          d.cliente_id = data[0].id;
          flujoActual.esperando = "equipo_id";

          const mq = await supabase.from("maquinas").select("id,marca,modelo,estado").eq("empresa_id",empresa_id).eq("estado","disponible").limit(20);
          renderMini("Máquinas disponibles", mq.data||[], ["id","marca","modelo","estado"]);
          agregarMensaje("bot","Indica ID del equipo.");
          return;
        }catch(_e){
          agregarMensaje("system","Error de red buscando cliente para alquiler.");
          return;
        }
      }

      if(flujoActual.esperando==="equipo_id"){
        d.equipo_id = input.trim();
        try{
          const { data, error } = await supabase.from("maquinas").select("id,estado").eq("empresa_id",empresa_id).eq("id",d.equipo_id).maybeSingle();
          if(error || !data || data.estado!=="disponible"){
            agregarMensaje("bot","Máquina no disponible. Elige otra ID disponible.");
            return;
          }
        }catch(_e){
          agregarMensaje("system","Error validando máquina.");
          return;
        }
        flujoActual.esperando = "fecha_inicio";
        agregarMensaje("bot","Indica fecha_inicio (YYYY-MM-DD).");
        return;
      }

      if(flujoActual.esperando==="fecha_inicio"){ d.fecha_inicio=input.trim(); flujoActual.esperando="fecha_fin"; agregarMensaje("bot","Indica fecha_fin (YYYY-MM-DD)."); return; }
      if(flujoActual.esperando==="fecha_fin"){ d.fecha_fin=input.trim(); flujoActual.esperando="dias"; agregarMensaje("bot","Indica días."); return; }
      if(flujoActual.esperando==="dias"){ d.dias=input.trim(); flujoActual.esperando="precio"; agregarMensaje("bot","Indica precio."); return; }
      if(flujoActual.esperando==="precio"){ d.precio=input.trim(); await guardarAlquiler(); return; }
    }

    async function interpretarMensaje(texto){
      const t = mostrarTyping();
      const txt = (texto||"").trim();
      if(!txt){ t.stop("Escribe un comando."); return; }
      if(!empresa_id){ t.stop("Sesión sin empresa. Vuelve a iniciar sesión."); return; }

      if(flujoActual){
        try{
          if(flujoActual.tipo==="crear_cliente"){ await continuarFlujoCliente(txt); t.stop("Listo."); return; }
          if(flujoActual.tipo==="crear_cotizacion"){ await continuarFlujoCotizacion(txt); t.stop("Listo."); return; }
          if(flujoActual.tipo==="crear_alquiler"){ await continuarFlujoAlquiler(txt); t.stop("Listo."); return; }
          if(flujoActual.tipo==="cambiar_estado_maquina"){
            if(flujoActual.esperando==="ref") flujoActual.data.ref=txt; else flujoActual.data.estado=txt;
            await cambiarEstadoMaquina(); t.stop("Listo."); return;
          }
          if(flujoActual.tipo==="asignar_maquina"){
            if(flujoActual.esperando==="alquiler_id") flujoActual.data.alquiler_id=txt; else flujoActual.data.maquina_id=txt;
            await asignarMaquinaAlquiler(); t.stop("Listo."); return;
          }
        }catch(_e){
          t.stop("Error procesando el flujo actual.");
          return;
        }
      }

      const it = detectarIntencion(txt);

      if(["crear_cliente","crear_cotizacion","crear_alquiler","asignar_maquina","cambiar_estado_maquina"].includes(it.type)){
        if(!puedeEjecutarAccion(it.type)){
          t.stop("No tienes permisos para esa acción.");
          return;
        }
      }

      try{
        if(it.type==="crear_cliente"){ iniciarFlujoCliente(txt); t.stop("Iniciando flujo cliente..."); return; }
        if(it.type==="crear_cotizacion"){ iniciarFlujoCotizacion(); t.stop("Iniciando flujo cotización..."); return; }
        if(it.type==="crear_alquiler"){ iniciarFlujoAlquiler(); t.stop("Iniciando flujo alquiler..."); return; }
        if(it.type==="consultar_alquileres"){ await consultarAlquileres(it.filtro); t.stop(`Consulta de alquileres ${it.filtro} ejecutada.`); return; }
        if(it.type==="consultar_cotizaciones"){ await consultarCotizaciones(it.filtro); t.stop(`Consulta de cotizaciones ${it.filtro} ejecutada.`); return; }
        if(it.type==="consultar_maquinas"){ await consultarMaquinas(it.filtro); t.stop(`Consulta de máquinas ${it.filtro} ejecutada.`); return; }
        if(it.type==="consultar_clientes"){ await consultarClientes(it.busqueda||""); t.stop("Consulta de clientes ejecutada."); return; }
        if(it.type==="consultar_finanzas"){ await consultarFinanzas(); t.stop("Consulta financiera ejecutada."); return; }
        if(it.type==="consultar_resumen"){ await consultarResumenGeneral(); t.stop("Resumen listo."); return; }
        if(it.type==="cambiar_estado_maquina"){ await cambiarEstadoMaquina(); t.stop("Iniciando cambio de estado..."); return; }
        if(it.type==="asignar_maquina"){ await asignarMaquinaAlquiler(); t.stop("Iniciando asignación..."); return; }
        t.stop("No entendí. Usa: crear cliente, crear cotización, crear alquiler, alquileres activos, máquinas disponibles, finanzas, resumen.");
      }catch(_e){
        t.stop("Error ejecutando la solicitud.");
      }
    }

    function bindUI(){
      document.getElementById("btnLogin").addEventListener("click",login);
      document.getElementById("loginPassword").addEventListener("keydown",(e)=>{ if(e.key==="Enter") login(); });

      document.getElementById("btnSend").addEventListener("click",async ()=>{
        const i=document.getElementById("chatInput");
        const t=i.value.trim();
        if(!t) return;
        agregarMensaje("user",t);
        i.value="";
        await interpretarMensaje(t);
      });

      document.getElementById("chatInput").addEventListener("keydown",async (e)=>{
        if(e.key==="Enter"){
          e.preventDefault();
          const i=document.getElementById("chatInput");
          const t=i.value.trim();
          if(!t) return;
          agregarMensaje("user",t);
          i.value="";
          await interpretarMensaje(t);
        }
      });

      document.querySelectorAll("#quickActions .qbtn").forEach(b=>{
        b.addEventListener("click",async ()=>{
          const q=b.getAttribute("data-q")||"";
          agregarMensaje("user",q);
          await interpretarMensaje(q);
        });
      });
    }

    initSupabase();
    bindUI();
  </script>
</body>
</html>
