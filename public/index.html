<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALCON OPS · Asistente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2f7cff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ALCON OPS" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <style>
    :root{
      --bg:#0b1220; --line:#21304d; --txt:#e8eefc; --muted:#98a8c7;
      --pri:#2f7cff; --pri2:#1f5fd1; --bot:#16233b; --usr:#2f7cff;
      --warn:#f59e0b; --ok:#10b981; --err:#ef4444; --red:#c0392b;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0b1220;color:var(--txt)}
    .app{height:100%;display:flex;align-items:center;justify-content:center;padding:16px}
    .panel{width:min(1100px,100%);height:min(92vh,900px);display:grid;grid-template-columns:300px 1fr;background:#0f1728;border:1px solid var(--line);border-radius:16px;overflow:hidden}
    .left{border-right:1px solid var(--line);display:flex;flex-direction:column}
    .brand{padding:18px;border-bottom:1px solid var(--line)}
    .brand h1{margin:0;font-size:17px;font-weight:800;letter-spacing:-.3px}
    .brand p{margin:5px 0 0;color:var(--muted);font-size:11px}
    .ai-badge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:3px 9px;background:#0d1f3c;border:1px solid #2a4a8a;border-radius:999px;font-size:10px;color:#7eb3ff;font-weight:600}
    .ai-badge::before{content:"";width:6px;height:6px;border-radius:50%;background:#2f7cff;box-shadow:0 0 6px #2f7cff;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .ctx{padding:14px 18px;border-bottom:1px solid var(--line);display:grid;gap:5px}
    .ctx .kv{font-size:11px;color:var(--muted)}
    .ctx .kv b{color:var(--txt)}
    .quick-label{padding:12px 18px 6px;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.6px;text-transform:uppercase}
    .quick{padding:0 12px 12px;display:grid;gap:6px;overflow:auto}
    .qbtn{border:1px solid #2a3b60;background:#13203a;color:#dbe7ff;border-radius:9px;padding:9px 12px;font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:background .15s}
    .qbtn:hover{background:#1a2b4a;border-color:#3a5090}
    .right{display:flex;flex-direction:column;min-width:0}
    .top{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .top-title{font-size:14px;font-weight:700}
    .top-sub{font-size:11px;color:var(--muted);margin-top:1px}
    .badge{font-size:10px;padding:3px 9px;border:1px solid #314a7a;border-radius:999px;background:#1a2744;color:#bcd0ff}
    .badge.ai{border-color:#2f5cb0;background:#0d1f3c;color:#7eb3ff}
    .top .actions{display:flex;gap:8px;align-items:center}
    .top .logout{background:transparent;border:1px solid #3a4e7a;color:#bcd0ff;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer}
    .top .logout:hover{background:#1a2744}
    .messages{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
    .msg-wrap{display:flex;gap:8px;align-items:flex-end}
    .msg-wrap.user{justify-content:flex-end}
    .avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
    .avatar.bot{background:linear-gradient(135deg,#1a3060,#2f7cff);border:1px solid #3a6abf;color:#a0c4ff}
    .avatar.usr{background:#2f7cff;color:#fff}
    .msg{max-width:min(80%,680px);padding:10px 13px;border-radius:12px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;border:1px solid transparent}
    .msg.bot{background:var(--bot);border-color:#263b62;border-bottom-left-radius:4px}
    .msg.user{background:var(--usr);color:#fff;border-bottom-right-radius:4px}
    .msg.system{background:#2a1f10;border-color:#5f4215;color:#ffd9a1;font-size:12px}
    .msg-time{font-size:10px;color:var(--muted);margin-top:3px;padding:0 2px}
    .input{border-top:1px solid var(--line);padding:10px;display:flex;gap:8px;align-items:center}
    .input input{flex:1;background:#111d34;border:1px solid #2a3f69;color:#e5eeff;border-radius:10px;padding:11px 13px;font-size:13.5px;outline:none;transition:border .15s}
    .input input:focus{border-color:#4a7adf}
    .input input::placeholder{color:#4a6090}
    .send-btn{background:var(--pri);border:0;color:#fff;border-radius:10px;padding:0 16px;height:42px;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap;flex-shrink:0;transition:background .15s}
    .send-btn:hover{background:var(--pri2)}
    .send-btn:disabled{opacity:.5;cursor:not-allowed}
    .login-wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:20px}
    .login{width:min(420px,100%);background:#0f1728;border:1px solid var(--line);border-radius:14px;padding:24px}
    .login h2{margin:0 0 4px;font-size:22px;font-weight:800}
    .login .login-sub{margin:0 0 20px;color:var(--muted);font-size:13px}
    .f{display:grid;gap:6px;margin-bottom:12px}
    .f label{font-size:11px;color:#b8c7e6;font-weight:600;letter-spacing:.3px}
    .f input{background:#101a2f;border:1px solid #2a3b61;color:#eaf1ff;border-radius:10px;padding:11px 12px;font-size:14px;outline:none;transition:border .15s}
    .f input:focus{border-color:#4a7adf}
    .login button{width:100%;height:44px;border:0;border-radius:10px;background:var(--pri);color:#fff;font-weight:700;cursor:pointer;font-size:14px;margin-top:4px}
    .login button:disabled{opacity:.6;cursor:wait}
    .err{margin-top:10px;color:#ffb4b4;font-size:12px;min-height:16px}
    .hidden{display:none!important}
    .mini-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:11.5px}
    .mini-table th,.mini-table td{border-bottom:1px solid #1e3055;padding:6px 5px;text-align:left}
    .mini-table th{color:#7eb3ff;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
    .mini-table tr:last-child td{border-bottom:none}
    .mini-table tr:hover td{background:#1a2744}
    .typing{display:inline-flex;gap:5px;align-items:center;padding:2px 0}
    .typing i{width:7px;height:7px;border-radius:50%;background:#5a90e0;display:inline-block;animation:blink 1.1s infinite}
    .typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
    @keyframes blink{0%,80%,100%{opacity:.2;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}
    .thinking-label{font-size:11px;color:#5a90e0;margin-left:6px;font-style:italic}
    .stat-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
    .stat-pill{padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid}
    .stat-pill.ok{background:#0d2a1c;border-color:#0f5132;color:#34c77b}
    .stat-pill.warn{background:#2a1f0a;border-color:#6b4f10;color:#f59e0b}
    .stat-pill.err{background:#2a0d0d;border-color:#7a1f1f;color:#f87171}
    .stat-pill.info{background:#0d1f3c;border-color:#2a4a8a;color:#7eb3ff}
    @media(max-width:920px){.panel{grid-template-columns:1fr}.left{display:none}}
  </style>
</head>
<body>
  <div class="app">
    <div id="loginScreen" class="login-wrap">
      <div class="login">
        <h2>ALCON OPS</h2>
        <p class="login-sub">Asistente operativo inteligente</p>
        <div class="f"><label>CORREO</label><input id="loginEmail" type="email" autocomplete="username" placeholder="usuario@empresa.com" /></div>
        <div class="f"><label>CONTRASEÑA</label><input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••" /></div>
        <button id="btnLogin">Ingresar</button>
        <div id="loginError" class="err"></div>
      </div>
    </div>

    <div id="chatScreen" class="panel hidden">
      <aside class="left">
        <div class="brand">
          <h1>ALCON OPS</h1>
          <p>Plataforma de gestión de alquileres</p>
          <div class="ai-badge">IA activa · Claude</div>
        </div>
        <div class="ctx">
          <div class="kv">Usuario: <b id="ctxUser">-</b></div>
          <div class="kv">Empresa: <b id="ctxEmpresa">-</b></div>
          <div class="kv">Rol: <b id="ctxRol">-</b></div>
        </div>
        <div class="quick-label">Accesos rápidos</div>
        <div class="quick" id="quickActions">
          <button class="qbtn" data-q="crear cliente nuevo">➕ Crear cliente</button>
          <button class="qbtn" data-q="crear cotización">📋 Crear cotización</button>
          <button class="qbtn" data-q="crear alquiler">🔧 Crear alquiler</button>
          <button class="qbtn" data-q="alquileres activos">📦 Alquileres activos</button>
          <button class="qbtn" data-q="cotizaciones aprobadas">✅ Cotizaciones aprobadas</button>
          <button class="qbtn" data-q="máquinas disponibles">🏗️ Máquinas disponibles</button>
          <button class="qbtn" data-q="dame el resumen general de hoy">📊 Resumen del día</button>
          <button class="qbtn" data-q="cómo están las finanzas">💰 Finanzas</button>
          <button class="qbtn" data-q="máquinas varadas">⚠️ Máquinas varadas</button>
          <button class="qbtn" data-q="alquileres por vencer esta semana">🕐 Por vencer</button>
        </div>
      </aside>
      <section class="right">
        <div class="top">
          <div>
            <div class="top-title">Asistente ALCON OPS</div>
            <div class="top-sub">Powered by Claude · Datos en tiempo real</div>
          </div>
          <div class="actions">
            <span class="badge ai">IA conectada</span>
            <button id="btnClear" class="logout" title="Limpiar chat">Limpiar</button>
            <button id="btnLogout" class="logout" title="Cerrar sesión">Salir</button>
          </div>
        </div>
        <div id="messages" class="messages"></div>
        <div class="input">
          <input id="chatInput" placeholder="Pregunta algo o da una instrucción..." autocomplete="off" />
          <button id="btnSend" class="send-btn">Enviar</button>
        </div>
      </section>
    </div>
  </div>

  <script>
  (function(){
    "use strict";

    // ============================================================
    // CONFIGURACIÓN
    // ============================================================
    const SUPABASE_URL  = "https://oguxdohmutqgacahcwop.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ndXhkb2htdXRxZ2FjYWhjd29wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mjc0NzcsImV4cCI6MjA4ODMwMzQ3N30.RRruTo8B7k4R97Igq7_KV1PV58FqrpIzEu0R_MXIwR8";



    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    // ============================================================
    // ESTADO GLOBAL
    // ============================================================
    let empresa_id     = null;
    let rol_usuario    = null;
    let flujoActual    = null;
    let user_id        = null;
    let empresa_nombre = "";
    let usuario_email  = "";
    let conversationHistory = [];   // historial para la IA
    let enviando = false;

    // ============================================================
    // UTILIDADES
    // ============================================================
    function fmt(n){ return (Number(n)||0).toLocaleString("es-CO"); }

    function normalizarTexto(t){
      return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim();
    }

    function escPostgrest(s){
      return String(s||"").replace(/[,()"']/g,"").trim();
    }

    function logErr(ctx, err){
      try{ console.error("[ALCON]", ctx, err); }catch(_){}
    }

    function horaActual(){
      return new Date().toLocaleTimeString("es-CO", {hour:"2-digit", minute:"2-digit"});
    }

    // ============================================================
    // INIT
    // ============================================================
    async function initApp(){
      try{
        const { data, error } = await sb.auth.getSession();
        if(error){ logErr("getSession", error); return; }
        if(data?.session?.user) await cargarContextoUsuario();
      }catch(e){ logErr("initApp", e); }
    }

    // ============================================================
    // MENSAJES UI
    // ============================================================
    function agregarMensaje(tipo, texto, html=false){
      const box = document.getElementById("messages");
      const wrap = document.createElement("div");
      wrap.className = "msg-wrap " + (tipo==="user" ? "user" : "");

      if(tipo !== "user" && tipo !== "system"){
        const av = document.createElement("div");
        av.className = "avatar bot";
        av.textContent = "AI";
        wrap.appendChild(av);
      }

      const col = document.createElement("div");
      col.style.display = "flex";
      col.style.flexDirection = "column";
      col.style.alignItems = tipo==="user" ? "flex-end" : "flex-start";

      const msg = document.createElement("div");
      msg.className = "msg " + (tipo==="user" ? "user" : (tipo==="system" ? "system" : "bot"));
      if(html) msg.innerHTML = texto; else msg.textContent = texto;

      const time = document.createElement("div");
      time.className = "msg-time";
      time.textContent = horaActual();

      col.appendChild(msg);
      col.appendChild(time);
      wrap.appendChild(col);

      if(tipo === "user"){
        const av = document.createElement("div");
        av.className = "avatar usr";
        av.textContent = (usuario_email||"U")[0].toUpperCase();
        wrap.appendChild(av);
      }

      box.appendChild(wrap);
      box.scrollTop = box.scrollHeight;
      return wrap;
    }

    function mostrarTyping(){
      const box = document.getElementById("messages");
      const wrap = document.createElement("div");
      wrap.className = "msg-wrap";

      const av = document.createElement("div");
      av.className = "avatar bot";
      av.textContent = "AI";

      const msg = document.createElement("div");
      msg.className = "msg bot";
      msg.innerHTML = '<span class="typing"><i></i><i></i><i></i></span><span class="thinking-label">pensando...</span>';

      wrap.appendChild(av);
      wrap.appendChild(msg);
      box.appendChild(wrap);
      box.scrollTop = box.scrollHeight;

      return {
        stop: (t, h=false) => {
          if(t===undefined || t===null || t===""){ wrap.remove(); return; }
          msg.innerHTML = "";
          if(h) msg.innerHTML = t; else msg.textContent = t;
          const time = document.createElement("div");
          time.className = "msg-time";
          time.textContent = horaActual();
          msg.after(time);
          box.scrollTop = box.scrollHeight;
        },
        remove: () => { try{ wrap.remove(); }catch(_){} }
      };
    }

    // ============================================================
    // PERMISOS
    // ============================================================
    function puedeEjecutarAccion(tipo){
      if(!rol_usuario) return false;
      const rol = normalizarTexto(rol_usuario);
      if(rol==="superadmin" || rol==="admin_empresa" || rol==="admin") return true;
      if(rol==="operaciones"){
        return ["crear_alquiler","asignar_maquina","cambiar_estado_maquina",
                "consultar_alquileres","consultar_maquinas","consultar_clientes",
                "consultar_finanzas","consultar_resumen"].includes(tipo);
      }
      if(rol==="comercial"){
        return ["crear_cliente","crear_cotizacion","consultar_cotizaciones",
                "consultar_clientes","consultar_resumen"].includes(tipo);
      }
      return false;
    }

    // ============================================================
    // LOGIN / LOGOUT
    // ============================================================
    async function login(){
      const btn = document.getElementById("btnLogin");
      const email    = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const err      = document.getElementById("loginError");
      err.textContent = "";

      if(!email || !password){ err.textContent = "Ingresa correo y contraseña."; return; }
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ err.textContent = "Correo inválido."; return; }

      btn.disabled = true;
      try{
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if(error){
          logErr("signIn", error);
          const msg = (error.message||"").toLowerCase();
          if(msg.includes("invalid")) err.textContent = "Credenciales inválidas.";
          else if(msg.includes("email not confirmed")) err.textContent = "Correo no confirmado.";
          else if(msg.includes("network")) err.textContent = "Sin conexión. Intenta de nuevo.";
          else err.textContent = "No se pudo iniciar sesión. Intenta de nuevo.";
          return;
        }
        if(!data?.user){ err.textContent = "Respuesta inválida del servidor."; return; }
        await cargarContextoUsuario();
      }catch(e){
        logErr("login", e);
        err.textContent = "Error de conexión.";
      }finally{
        btn.disabled = false;
      }
    }

    async function logout(){
      try{ await sb.auth.signOut(); }catch(e){ logErr("signOut", e); }
      empresa_id = null; rol_usuario = null; flujoActual = null;
      user_id = null; empresa_nombre = ""; usuario_email = "";
      conversationHistory = [];
      document.getElementById("messages").innerHTML = "";
      document.getElementById("loginPassword").value = "";
      document.getElementById("loginError").textContent = "";
      document.getElementById("chatScreen").classList.add("hidden");
      document.getElementById("loginScreen").classList.remove("hidden");
    }

    // ============================================================
    // CONTEXTO USUARIO
    // ============================================================
    async function cargarContextoUsuario(){
      const errBox = document.getElementById("loginError");
      try{
        const { data: au, error: ae } = await sb.auth.getUser();
        if(ae || !au?.user){ errBox.textContent = "No se pudo validar sesión."; return; }
        user_id = au.user.id;
        usuario_email = au.user.email || "";

        const { data: ue, error: eue } = await sb
          .from("usuarios_empresas")
          .select("user_id,empresa_id,rol,empresa:empresas(nombre)")
          .eq("user_id", user_id)
          .maybeSingle();

        if(eue){ logErr("usuarios_empresas", eue); errBox.textContent = "Error consultando datos de empresa."; await sb.auth.signOut(); return; }
        if(!ue || !ue.empresa_id){ errBox.textContent = "Usuario sin empresa asignada. Contacta al administrador."; await sb.auth.signOut(); return; }

        empresa_id     = ue.empresa_id;
        rol_usuario    = ue.rol || "operaciones";
        empresa_nombre = ue.empresa?.nombre || "Empresa";
        mostrarChat();
      }catch(e){
        logErr("cargarContextoUsuario", e);
        errBox.textContent = "No se pudo cargar el contexto.";
      }
    }

    function mostrarChat(){
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("chatScreen").classList.remove("hidden");
      document.getElementById("ctxUser").textContent = usuario_email || user_id || "-";
      document.getElementById("ctxEmpresa").textContent = empresa_nombre || "-";
      document.getElementById("ctxRol").textContent = rol_usuario || "-";
      const box = document.getElementById("messages");
      if(!box.children.length){
        agregarMensaje("bot",
          `Hola, estoy en línea.

Soy el asistente operativo de ${empresa_nombre}. Puedo consultar el estado de la flota, alquileres, cotizaciones, finanzas y crear registros si tienes los permisos.

Házme cualquier pregunta en lenguaje natural — no necesitas seguir un menú.`
        );
      }
      document.getElementById("chatInput").focus();
    }

    // ============================================================
    // CONTEXTO VIVO DE LA BASE DE DATOS PARA LA IA
    // ============================================================
    async function fetchContextoDB(){
      try{
        const desde30 = new Date(Date.now()-30*86400000).toISOString().slice(0,10);
        const [maq, alqA, alqV, cot, caj, cli] = await Promise.all([
          sb.from("maquinas").select("id,marca,modelo,estado,alquiler_nro").eq("empresa_id", empresa_id).limit(100),
          sb.from("alquileres_ops").select("id,estado,equipoId,fechaInicio,fecha_fin,precioDia,dias").eq("empresa_id", empresa_id).eq("estado","activo").order("id",{ascending:false}).limit(15),
          sb.from("alquileres_ops").select("id,fecha_fin").eq("empresa_id", empresa_id).eq("estado","activo").not("fecha_fin","is",null).lte("fecha_fin", new Date(Date.now()+7*86400000).toISOString().slice(0,10)).limit(10),
          sb.from("cotizaciones").select("id,estado,dias,precio,modalidad").eq("empresa_id", empresa_id).in("estado",["borrador","en_revision","enviada","aprobada","negociacion"]).order("id",{ascending:false}).limit(15),
          sb.from("caja_movimientos").select("tipo,monto,fecha").eq("empresa_id", empresa_id).gte("fecha", desde30).limit(500),
          sb.from("clientes").select("id,nombre_empresa,ciudad").eq("empresa_id", empresa_id).order("nombre_empresa").limit(20)
        ]);

        // Flota por estado
        const flota = {};
        for(const m of (maq.data||[])){
          flota[m.estado] = (flota[m.estado]||0)+1;
        }

        // Finanzas 30d
        let ingresos=0, gastos=0;
        for(const x of (caj.data||[])){
          const v = Number(x.monto)||0;
          if((x.tipo||"").toLowerCase().includes("ingreso")) ingresos+=v; else gastos+=v;
        }

        return {
          fecha_consulta: new Date().toLocaleDateString("es-CO"),
          flota_por_estado: flota,

    // ============================================================
    // LLAMADA A LIAN — frontend solo envía message + historial.
    // model, system prompt y construcción de messages[]
    // viven en server.js (nunca visibles en DevTools).
    // ============================================================
    async function callClaude(userMessage){
      const payload = {
        message:             userMessage,
        conversationHistory: conversationHistory || []
      };

      console.log("[LIAN] payload /api/chat:", payload);

      const response = await fetch("/api/chat", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(payload)
      });

      console.log("[LIAN] status /api/chat:", response.status);

      if(!response.ok){
        const txt = await response.text().catch(()=>"");
        console.error("[LIAN] /api/chat error:", txt);
        throw new Error("Error API " + response.status);
      }

      const data = await response.json();
      const raw = data.content?.find(b => b.type === "text")?.text
               || '{"reply":"No pude procesar tu mensaje.","action":null,"params":{}}';

      try{
        const clean = raw.trim().replace(/^```json?\s*/i,"").replace(/```$/,"").trim();
        return JSON.parse(clean);
      }catch(e){
        console.error("[LIAN] parse AI response", e, raw);
        return { reply: raw, action: null, params:{} };
      }
    }

    // ============================================================
    // EXTRACTOR DE DATOS DE CLIENTE
    // ============================================================
    function extraerDatosCliente(texto){
      const t = texto || "";
      const o = {};
      const nit = t.match(/(?:nit)\s*[:#-]?\s*([\d.\-\s]{5,18})/i);
      const tel = t.match(/(?:telefono|teléfono|tel|celular|movil|móvil)\s*[:#-]?\s*(\+?[\d\s-]{7,18})/i);
      const cor = t.match(/[a-zA-Z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/i);
      const nom = t.match(/(?:nombre|empresa|cliente)\s*[:#-]?\s*([a-zA-Z0-9ÁÉÍÓÚÑáéíóúñ .,&-]{3,})/i);
      const con = t.match(/(?:contacto)\s*[:#-]?\s*([a-zA-ZÁÉÍÓÚÑáéíóúñ .-]{3,})/i);
      const car = t.match(/(?:cargo)\s*[:#-]?\s*([a-zA-ZÁÉÍÓÚÑáéíóúñ .-]{3,})/i);
      const dir = t.match(/(?:direccion|dirección)\s*[:#-]?\s*([a-zA-Z0-9ÁÉÍÓÚÑáéíóúñ #.,-]{5,})/i);
      const ciu = t.match(/(?:ciudad)\s*[:#-]?\s*([a-zA-ZÁÉÍÓÚÑáéíóúñ .-]{3,})/i);
      const obs = t.match(/(?:obs|observacion|observación)\s*[:#-]?\s*(.+)$/i);

      if(nit) o.nit = nit[1].replace(/[.\-\s]/g,"");
      if(tel) o.telefono = tel[1].replace(/\s+/g,"").trim();
      if(cor) o.correo = cor[0];
      if(nom) o.nombre_empresa = nom[1].trim();
      if(con) o.contacto = con[1].trim();
      if(car) o.cargo = car[1].trim();
      if(dir) o.direccion = dir[1].trim();
      if(ciu) o.ciudad = ciu[1].trim();
      if(obs) o.obs = obs[1].trim();
      return o;
    }

    async function continuarFlujoCliente(input){
      if(!flujoActual || flujoActual.tipo!=="crear_cliente") return;
      if(input){
        const ex = extraerDatosCliente(input);
        Object.assign(flujoActual.data, ex);
        if(flujoActual.esperandoCampo && !ex[flujoActual.esperandoCampo]){
          flujoActual.data[flujoActual.esperandoCampo] = input.trim();
        }
      }

      const d = flujoActual.data;
      const falt = [];
      ["nombre_empresa","nit","telefono","correo","contacto","cargo","direccion","ciudad","obs"].forEach(k=>{ if(!d[k]) falt.push(k); });
      if(falt.length){
        const q = {
          nombre_empresa:"¿Cuál es el nombre de la empresa cliente?",
          nit:"¿Cuál es el NIT del cliente? (solo números)",
          telefono:"¿Cuál es el teléfono de contacto?",
          correo:"¿Cuál es el correo electrónico?",
          contacto:"¿Nombre del contacto principal?",
          cargo:"¿Cuál es el cargo del contacto?",
          direccion:"¿Cuál es la dirección?",
          ciudad:"¿En qué ciudad?",
          obs:"Alguna observación adicional (o escribe: sin observaciones)"
        };
        flujoActual.esperandoCampo = falt[0];
        agregarMensaje("bot", q[falt[0]]);
        return;
      }

      const nitLimpio = String(d.nit).replace(/[.\-\s]/g,"");
      if(!/^\d{5,15}$/.test(nitLimpio)){
        flujoActual.esperandoCampo="nit"; d.nit="";
        agregarMensaje("bot","NIT inválido. Debe tener entre 5 y 15 dígitos. Escríbelo de nuevo.");
        return;
      }
      d.nit = nitLimpio;

      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d.correo)){
        flujoActual.esperandoCampo="correo"; d.correo="";
        agregarMensaje("bot","El correo no tiene un formato válido. Escríbelo de nuevo.");
        return;
      }

      await guardarCliente();
    }

    async function guardarCliente(){
      const d = flujoActual.data;
      if(/sin observaciones/i.test(d.obs)) d.obs="";
      try{
        const { data: existe } = await sb.from("clientes").select("id,nombre_empresa").eq("empresa_id",empresa_id).eq("nit",d.nit).limit(1);
        if(existe && existe.length){
          agregarMensaje("system",`Ya existe un cliente con NIT ${d.nit}: ${existe[0].nombre_empresa} (ID ${existe[0].id}).`);
          flujoActual=null; return;
        }
        const { data, error } = await sb.from("clientes")
          .insert([{ empresa_id, nombre_empresa:d.nombre_empresa, nit:d.nit, telefono:d.telefono, correo:d.correo, contacto:d.contacto, cargo:d.cargo, direccion:d.direccion, ciudad:d.ciudad, obs:d.obs }])
          .select("id,nombre_empresa,nit").single();

ID: ${data.id} · ${data.nombre_empresa} · NIT ${data.nit}

¿Quieres crear una cotización o un alquiler para este cliente?`);
      }catch(e){
        logErr("guardarCliente", e);
        agregarMensaje("system","Error de red al crear cliente.");
      }
      flujoActual=null;
    }

        let q = sb.from("clientes").select("id,nombre_empresa,nit,telefono,ciudad").eq("empresa_id",empresa_id).order("nombre_empresa",{ascending:true}).limit(25);
        const b = escPostgrest(busqueda);
        if(b) q = q.or(`nombre_empresa.ilike.%${b}%,nit.ilike.%${b}%`);
        const { data, error } = await q;
        if(error){ logErr("cli list", error); return agregarMensaje("system","No pude consultar clientes."); }
        renderMini(`Clientes: ${(data||[]).length}`, data||[], ["id","nombre_empresa","nit","telefono","ciudad"]);
      }catch(e){ logErr("consultarClientes", e); agregarMensaje("system","Error de red en clientes."); }
    }

    async function consultarFinanzas(){
      try{
        const desde = new Date(Date.now()-90*86400000).toISOString().slice(0,10);
        const { data, error } = await sb.from("caja_movimientos").select("id,tipo,monto,concepto,fecha").eq("empresa_id",empresa_id).gte("fecha",desde).order("fecha",{ascending:false}).limit(500);
        if(error){ logErr("finanzas", error); return agregarMensaje("system","No pude consultar finanzas."); }
        let i=0,g=0;
        for(const m of (data||[])){ const v=Number(m.monto)||0; if((m.tipo||"").toLowerCase().includes("ingreso")) i+=v; else g+=v; }
        agregarMensaje("bot",`💰 Finanzas — últimos 90 días

Ingresos:  $${fmt(i)}
Gastos:    $${fmt(g)}
Balance:   $${fmt(i-g)}
Movimientos: ${(data||[]).length}`);
      }catch(e){ logErr("consultarFinanzas", e); agregarMensaje("system","Error de red en finanzas."); }
    }

    async function consultarResumenGeneral(){
      try{
        const [m1,m2,m3,a1,c1,fin] = await Promise.all([
          sb.from("maquinas").select("id",{count:"exact",head:true}).eq("empresa_id",empresa_id).eq("estado","disponible"),
          sb.from("maquinas").select("id",{count:"exact",head:true}).eq("empresa_id",empresa_id).eq("estado","trabajando"),
          sb.from("maquinas").select("id",{count:"exact",head:true}).eq("empresa_id",empresa_id).eq("estado","varada"),
          sb.from("alquileres_ops").select("id",{count:"exact",head:true}).eq("empresa_id",empresa_id).eq("estado","activo"),
          sb.from("cotizaciones").select("id",{count:"exact",head:true}).eq("empresa_id",empresa_id).in("estado",["borrador","en_revision","enviada","negociacion"]),
          sb.from("caja_movimientos").select("tipo,monto").eq("empresa_id",empresa_id).gte("fecha",new Date(Date.now()-30*86400000).toISOString().slice(0,10)).limit(500)
        ]);
        let i=0,g=0;
        for(const x of (fin.data||[])){ const n=Number(x.monto)||0; if((x.tipo||"").toLowerCase().includes("ingreso")) i+=n; else g+=n; }
        agregarMensaje("bot",
          `📊 Resumen operativo — ${new Date().toLocaleDateString("es-CO")}

` +
          `🏗️ Flota
   Disponibles: ${m1.count||0} | Trabajando: ${m2.count||0} | Varadas: ${m3.count||0}

` +
          `📦 Operaciones
   Alquileres activos: ${a1.count||0}
   Cotizaciones en proceso: ${c1.count||0}

` +
          `💰 Finanzas (30 días)
   Ingresos: $${fmt(i)} | Gastos: $${fmt(g)} | Balance: $${fmt(i-g)}`
        );
      }catch(e){ logErr("consultarResumen", e); agregarMensaje("system","Error de red en resumen."); }
    }

    // ============================================================
    // CAMBIAR ESTADO MÁQUINA
    // ============================================================
    async function cambiarEstadoMaquina(){
      if(!flujoActual || flujoActual.tipo!=="cambiar_estado_maquina"){
        flujoActual = { tipo:"cambiar_estado_maquina", data:{ref:"",estado:""}, esperando:"ref" };
        agregarMensaje("bot","¿Qué equipo quieres actualizar? (ID, marca o modelo)");
        return;
      }
      if(flujoActual.esperando==="ref"){
        flujoActual.esperando="estado";
        agregarMensaje("bot","\u00bfCu\u00e1l es el nuevo estado?\nOpciones: disponible, trabajando, varada, alistamiento, devolucion");
        return;
      }

      const d = flujoActual.data;
      const e = normalizarTexto(d.estado);
      const ok = ["disponible","trabajando","varada","alistamiento","devolucion"];
      if(!ok.includes(e)){
        agregarMensaje("bot",`Estado no válido. Usa: ${ok.join(", ")}.`);
        flujoActual=null; return;
      }

      try{
        const ref = escPostgrest(d.ref);
        if(!ref){ agregarMensaje("system","Referencia vacía."); flujoActual=null; return; }
        const { data:found, error:eF } = await sb.from("maquinas").select("id,marca,modelo,estado").eq("empresa_id",empresa_id).or(`id.eq.${ref},marca.ilike.%${ref}%,modelo.ilike.%${ref}%`).limit(1);
        if(eF){ logErr("buscar maq estado", eF); agregarMensaje("system","Error buscando equipo."); flujoActual=null; return; }
        if(!found||!found.length){ agregarMensaje("bot","No encontré ese equipo."); flujoActual=null; return; }
        const maqId = found[0].id;
        const { data:upd, error:eU } = await sb.from("maquinas").update({estado:e}).eq("empresa_id",empresa_id).eq("id",maqId).select("id,marca,modelo,estado").maybeSingle();
        if(eU||!upd){ logErr("update estado maq", eU); agregarMensaje("system","No pude cambiar el estado."); flujoActual=null; return; }
        agregarMensaje("bot",`✅ Estado actualizado: ${upd.marca||""} ${upd.modelo||""} (ID ${upd.id}) → ${upd.estado}`);
      }catch(e){ logErr("cambiarEstado", e); agregarMensaje("system","Error de red."); }
      flujoActual=null;
    }

    // ============================================================
    // ASIGNAR MÁQUINA A ALQUILER
    // ============================================================
    async function asignarMaquinaAlquiler(){
      if(!flujoActual || flujoActual.tipo!=="asignar_maquina"){
        flujoActual = { tipo:"asignar_maquina", data:{alquiler_id:"",maquina_id:""}, esperando:"alquiler_id" };
        agregarMensaje("bot","¿Cuál es el ID del alquiler?");
        return;
      }
      if(flujoActual.esperando==="alquiler_id"){
        if(!flujoActual.data.alquiler_id){ agregarMensaje("bot","ID de alquiler vacío."); flujoActual=null; return; }
        try{
          const { data:alq, error } = await sb.from("alquileres_ops").select("id,estado").eq("empresa_id",empresa_id).eq("id",flujoActual.data.alquiler_id).maybeSingle();
          if(error){ logErr("validar alq", error); agregarMensaje("system","Error validando alquiler."); flujoActual=null; return; }
          if(!alq){ agregarMensaje("bot","No encontré ese alquiler."); flujoActual=null; return; }
        }catch(e){ logErr("validar alq net", e); agregarMensaje("system","Error de red."); flujoActual=null; return; }
        flujoActual.esperando="maquina_id";
        try{
          const { data } = await sb.from("maquinas").select("id,marca,modelo").eq("empresa_id",empresa_id).eq("estado","disponible").limit(20);
          renderMini("Equipos disponibles", data||[], ["id","marca","modelo"]);
        }catch(e){ logErr("listar maq disp2", e); }
        agregarMensaje("bot","¿Cuál es el ID del equipo a asignar?");
        return;
      }

      const d = flujoActual.data;
      try{
        if(!d.alquiler_id||!d.maquina_id){ agregarMensaje("system","Datos incompletos."); flujoActual=null; return; }
        const { data:mq, error:eMq } = await sb.from("maquinas").select("id,estado").eq("empresa_id",empresa_id).eq("id",d.maquina_id).maybeSingle();
        if(eMq){ logErr("validar maq asig", eMq); agregarMensaje("system","Error validando equipo."); flujoActual=null; return; }
        if(!mq){ agregarMensaje("bot","No encontré ese equipo."); flujoActual=null; return; }
        if(mq.estado!=="disponible"){ agregarMensaje("bot",`El equipo no está disponible (estado: ${mq.estado}).`); flujoActual=null; return; }
        const { error:e1 } = await sb.from("alquileres_ops").update({equipoId:d.maquina_id,estado:"activo"}).eq("empresa_id",empresa_id).eq("id",d.alquiler_id);
        if(e1){ logErr("asignar alq", e1); agregarMensaje("system","No pude asignar."); flujoActual=null; return; }
        const { error:e2 } = await sb.from("maquinas").update({estado:"trabajando",alquiler_nro:d.alquiler_id}).eq("empresa_id",empresa_id).eq("id",d.maquina_id);
        if(e2){ logErr("asignar maq", e2); agregarMensaje("system","Alquiler actualizado pero el equipo no. Revísalo."); flujoActual=null; return; }
        agregarMensaje("bot",`✅ Equipo ${d.maquina_id} asignado al alquiler ${d.alquiler_id}.`);
      }catch(e){ logErr("asignarMaquina", e); agregarMensaje("system","Error de red."); }
      flujoActual=null;
    }

    // ============================================================
    // RENDER DE TABLA
    // ============================================================
    function esc(s){
      return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }

    function renderMini(titulo, rows, cols){
      if(!rows||!rows.length){ agregarMensaje("bot",`${esc(titulo)}
Sin resultados.`,true); return; }
      const head = cols.map(c=>`<th>${esc(c)}</th>`).join("");
      const body = rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r&&r[c]!==undefined&&r[c]!==null?r[c]:"")}</td>`).join("")}</tr>`).join("");
      agregarMensaje("bot",`<div style="font-size:12px;font-weight:700;margin-bottom:6px;color:#7eb3ff">${esc(titulo)}</div><table class="mini-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`,true);
    }

    // ============================================================
    // EJECUTAR ACCIÓN DESDE RESPUESTA IA
    // ============================================================
    async function ejecutarAccion(action, params={}){
      const filtro = params.filtro || "activo";
      switch(action){
        case "crear_cliente":          await iniciarFlujoCliente(""); break;
        case "crear_cotizacion":       iniciarFlujoCotizacion(); break;
        case "crear_alquiler":         iniciarFlujoAlquiler(); break;
        case "consultar_alquileres":   await consultarAlquileres(filtro); break;
        case "consultar_cotizaciones": await consultarCotizaciones(params.filtro||"aprobada"); break;
        case "consultar_maquinas":     await consultarMaquinas(params.filtro||"disponible"); break;
        case "consultar_clientes":     await consultarClientes(params.busqueda||""); break;
        case "consultar_finanzas":     await consultarFinanzas(); break;
        case "consultar_resumen":      await consultarResumenGeneral(); break;
        case "asignar_maquina":        await asignarMaquinaAlquiler(); break;
        case "cambiar_estado_maquina": await cambiarEstadoMaquina(); break;
        default: break;
      }
    }

    // ============================================================
    // INTÉRPRETE CENTRAL — CON IA
    // ============================================================
    async function interpretarMensaje(texto){
      const txt = (texto||"").trim();
      if(!txt){ return; }
      if(!empresa_id){ agregarMensaje("system","Sesión sin empresa. Vuelve a iniciar sesión."); return; }

      // Cancelar flujo activo
      if(flujoActual && /^(cancelar|salir|abortar|cancel|no|parar)$/i.test(txt)){
        flujoActual = null;
        agregarMensaje("bot","Entendido, cancelado. ¿En qué más te ayudo?");
        return;
      }

      // Flujo activo: continuar step-by-step sin IA
      if(flujoActual){
        try{
          if(flujoActual.tipo==="crear_cliente")          { await continuarFlujoCliente(txt); return; }
          if(flujoActual.tipo==="crear_cotizacion")       { await continuarFlujoCotizacion(txt); return; }
          if(flujoActual.tipo==="crear_alquiler")         { await continuarFlujoAlquiler(txt); return; }
          if(flujoActual.tipo==="cambiar_estado_maquina") {
            if(flujoActual.esperando==="ref") flujoActual.data.ref=txt;
            else flujoActual.data.estado=txt;
            await cambiarEstadoMaquina(); return;
          }
          if(flujoActual.tipo==="asignar_maquina") {
            if(flujoActual.esperando==="alquiler_id") flujoActual.data.alquiler_id=txt;
            else flujoActual.data.maquina_id=txt;
            await asignarMaquinaAlquiler(); return;
          }
        }catch(e){
          logErr("flujo activo", e);
          flujoActual=null;
          agregarMensaje("system","Error en el flujo. Cancelado.");
          return;
        }
      }

      // IA activa
      const typing = mostrarTyping();
      setBtnState(true);
      try{
        const result = await callClaude(txt);
        typing.remove();

        const reply  = result.reply  || "No pude procesar tu mensaje.";
        const action = result.action || null;
        const params = result.params || {};

        agregarMensaje("bot", reply);

        // Actualizar historial (máx 20 turnos)
        conversationHistory.push({ role:"user",      content: txt });
        conversationHistory.push({ role:"assistant",  content: JSON.stringify(result) });
        if(conversationHistory.length > 40) conversationHistory.splice(0,2);

        // Ejecutar acción si la IA lo pidió
        if(action){
          if(!puedeEjecutarAccion(action)){
            agregarMensaje("system","No tienes permisos para esa acción con tu rol actual.");
            return;
          }
          await ejecutarAccion(action, params);
        }
      }catch(e){
        typing.remove();
        logErr("interpretarMensaje IA", e);
        agregarMensaje("system",`Error conectando con la IA: ${e.message||"Error desconocido"}.
Verifica la API key o la conexión.`);
      }finally{
        setBtnState(false);
      }
    }

    function setBtnState(disabled){
      enviando = disabled;
      const btn = document.getElementById("btnSend");
      if(btn) btn.disabled = disabled;
    }

    // ============================================================
    // BIND UI
    // ============================================================
    async function handleSend(){
      if(enviando) return;
      const i = document.getElementById("chatInput");
      const t = i.value.trim();
      if(!t) return;
      agregarMensaje("user", t);
      i.value = "";
      await interpretarMensaje(t);
    }

    function bindUI(){
      document.getElementById("btnLogin").addEventListener("click", login);
      document.getElementById("loginPassword").addEventListener("keydown",(e)=>{ if(e.key==="Enter") login(); });
      document.getElementById("loginEmail").addEventListener("keydown",(e)=>{ if(e.key==="Enter") document.getElementById("loginPassword").focus(); });
      document.getElementById("btnLogout").addEventListener("click", logout);
      document.getElementById("btnSend").addEventListener("click", handleSend);
      document.getElementById("btnClear").addEventListener("click", ()=>{
        document.getElementById("messages").innerHTML = "";
        conversationHistory = [];
        agregarMensaje("bot","Chat limpiado. ¿En qué te ayudo?");
      });
      document.getElementById("chatInput").addEventListener("keydown",(e)=>{
        if(e.key==="Enter"){ e.preventDefault(); handleSend(); }
      });
      document.querySelectorAll("#quickActions .qbtn").forEach(b=>{
        b.addEventListener("click", async ()=>{
          if(enviando) return;
          const q = b.getAttribute("data-q")||"";
          agregarMensaje("user", q);
          await interpretarMensaje(q);
        });
      });
    }

    // ============================================================
    // ARRANQUE
    // ============================================================
    bindUI();
    initApp();
  })();
  </script>

          .catch(e => console.warn("[SW] error", e));
